                                                    If omitted for an OpenAI-compatible provider, a provider-specific default
                                                    URL is applied automatically.
                                                type: string
                                            provider:
                                                default: openai
                                                description: |-
                                                    Deprecated: use a prefixed model value (e.g. "anthropic/claude-sonnet-4-6") instead.
