{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
    annotations:
        controller-gen.kubebuilder.io/version: v0.20.0
    name: roleinstructions.platform.gratefulagents.dev
spec:
    group: platform.gratefulagents.dev
    names:
        kind: RoleInstruction
        listKind: RoleInstructionList
        plural: roleinstructions
        singular: roleinstruction
    scope: Cluster
    versions:
        - additionalPrinterColumns:
            - jsonPath: .spec.description
              name: Description
              type: string
            - jsonPath: .metadata.creationTimestamp
              name: Age
              type: date
          name: v1alpha1
          schema:
            openAPIV3Schema:
                description: |-
                    RoleInstruction is the Schema for the roleinstructions API.
                    Each CR defines the full behavioral prompt for one agent role.
                    The CR name must match the role name (e.g. "executor", "debugger").
                properties:
                    apiVersion:
                        description: |-
                            APIVersion defines the versioned schema of this representation of an object.
                            Servers should convert recognized schemas to the latest internal value, and
                            may reject unrecognized values.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
                        type: string
                    kind:
                        description: |-
                            Kind is a string value representing the REST resource this object represents.
                            Servers may infer this from the endpoint the client submits requests to.
                            Cannot be updated.
                            In CamelCase.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                        type: string
                    metadata:
                        type: object
                    spec:
                        description: |-
                            RoleInstructionSpec defines the behavioral prompt for an agent role.
                            The CR name MUST match the role name in AgentCatalog
                            (e.g. "executor", "debugger", "code-reviewer").
                            Convention: role name = RoleInstruction CR name. No explicit refs needed.
                        properties:
                            description:
                                description: |-
                                    Description is a short one-line summary used for HandoffDescription
                                    and tool catalog entries.
                                type: string
                            instructions:
                                description: |-
                                    Instructions is the full structured prompt injected into this role's
                                    system context. Supports XML-structured sections like <identity>,
                                    <constraints>, <delegation>, <execution_loop>, <style>, etc.
                                type: string
                            model:
                                description: |-
                                    Model is a legacy provider-independent value retained for API
                                    compatibility. Runtime role routing uses ModelsByProvider; when the active
                                    provider has no entry, the role inherits the parent run's model.
                                type: string
                            modelsByProvider:
                                additionalProperties:
                                    type: string
                                description: |-
                                    ModelsByProvider maps provider names (for example "openai", "anthropic",
                                    or "copilot") to the model this role should use with that provider. When
                                    the active provider has no entry, the role inherits the parent run's model.
                                type: object
                            reasoningLevel:
                                description: |-
                                    ReasoningLevel controls reasoning effort for this role. When empty, the
                                    role inherits the parent run's reasoning level.
                                enum:
                                    - none
                                    - low
                                    - medium
                                    - high
                                    - xhigh
                                    - max
                                type: string
                            toolAccess:
                                description: ToolAccess controls which tools this role can use.
                                enum:
                                    - full
                                    - read-only
                                    - analysis
                                    - execution
                                type: string
                        required:
                            - instructions
                        type: object
                    status:
                        description: RoleInstructionStatus defines the observed state of RoleInstruction.
                        properties:
                            conditions:
                                items:
                                    description: Condition contains details for one aspect of the current state of this API Resource.
                                    properties:
                                        lastTransitionTime:
                                            description: |-
                                                lastTransitionTime is the last time the condition transitioned from one status to another.
                                                This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                                            format: date-time
                                            type: string
                                        message:
                                            description: |-
                                                message is a human readable message indicating details about the transition.
                                                This may be an empty string.
                                            maxLength: 32768
                                            type: string
                                        observedGeneration:
                                            description: |-
                                                observedGeneration represents the .metadata.generation that the condition was set based upon.
                                                For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                                                with respect to the current state of the instance.
                                            format: int64
                                            minimum: 0
                                            type: integer
                                        reason:
                                            description: |-
                                                reason contains a programmatic identifier indicating the reason for the condition's last transition.
                                                Producers of specific condition types may define expected values and meanings for this field,
                                                and whether the values are considered a guaranteed API.
                                                The value should be a CamelCase string.
                                                This field may not be empty.
                                            maxLength: 1024
                                            minLength: 1
                                            pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                                            type: string
                                        status:
                                            description: status of the condition, one of True, False, Unknown.
                                            enum:
                                                - "True"
                                                - "False"
                                                - Unknown
                                            type: string
                                        type:
                                            description: type of condition in CamelCase or in foo.example.com/CamelCase.
                                            maxLength: 316
                                            pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                                            type: string
                                    required:
                                        - lastTransitionTime
                                        - message
                                        - reason
                                        - status
                                        - type
                                    type: object
                                type: array
                                x-kubernetes-list-map-keys:
                                    - type
                                x-kubernetes-list-type: map
                            phase:
                                type: string
                        type: object
                required:
                    - spec
                type: object
          served: true
          storage: true
          subresources:
            status: {}
{{- end }}
