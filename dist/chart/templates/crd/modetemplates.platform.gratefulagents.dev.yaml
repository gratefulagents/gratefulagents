{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
    annotations:
        controller-gen.kubebuilder.io/version: v0.20.0
    name: modetemplates.platform.gratefulagents.dev
spec:
    group: platform.gratefulagents.dev
    names:
        kind: ModeTemplate
        listKind: ModeTemplateList
        plural: modetemplates
        singular: modetemplate
    scope: Cluster
    versions:
        - additionalPrinterColumns:
            - jsonPath: .spec.name
              name: Name
              type: string
            - jsonPath: .spec.version
              name: Version
              type: string
            - jsonPath: .spec.category
              name: Category
              type: string
            - jsonPath: .metadata.creationTimestamp
              name: Age
              type: date
          name: v1alpha1
          schema:
            openAPIV3Schema:
                description: ModeTemplate is the Schema for the modetemplates API.
                properties:
                    apiVersion:
                        description: |-
                            APIVersion defines the versioned schema of this representation of an object.
                            Servers should convert recognized schemas to the latest internal value, and
                            may reject unrecognized values.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
                        type: string
                    kind:
                        description: |-
                            Kind is a string value representing the REST resource this object represents.
                            Servers may infer this from the endpoint the client submits requests to.
                            Cannot be updated.
                            In CamelCase.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                        type: string
                    metadata:
                        type: object
                    spec:
                        description: ModeTemplateSpec defines the desired state of ModeTemplate.
                        properties:
                            allowedMutatingTools:
                                description: |-
                                    AllowedMutatingTools lists mutating tool names that stay registered
                                    even when the effective permission mode is read-only (for example the
                                    GitHub review tools a read-only reviewer still needs).
                                items:
                                    type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            autonomous:
                                description: |-
                                    Autonomous indicates the mode runs without user interaction.
                                    When true, the agent never asks clarifying questions and completes work end-to-end.
                                type: boolean
                            category:
                                description: ModeCategory classifies execution complexity.
                                enum:
                                    - direct
                                    - orchestrated
                                type: string
                            constraints:
                                description: ModeConstraints defines runtime limits for a mode.
                                properties:
                                    maxConcurrentSubAgents:
                                        description: |-
                                            MaxConcurrentSubAgents limits parallel in-process sub-agent tasks.
                                            When 0, no limit is enforced.
                                        format: int32
                                        type: integer
                                    maxRetries:
                                        format: int32
                                        type: integer
                                    maxRuntimeMinutes:
                                        format: int32
                                        type: integer
                                    maxTurns:
                                        format: int32
                                        type: integer
                                    subAgentMaxTurns:
                                        description: |-
                                            SubAgentMaxTurns limits how many turns each specialist sub-agent can spend.
                                            When 0, sub-agents use the platform default.
                                        format: int32
                                        type: integer
                                type: object
                            defaultMCPServerRefs:
                                description: |-
                                    DefaultMCPServerRefs lists MCPServer names that are automatically
                                    attached to any AgentRun using this mode. The agent pipeline resolves
                                    these into MCP tools without requiring per-repo or per-run configuration.
                                items:
                                    description: NamedRef references another namespaced resource by name.
                                    properties:
                                        name:
                                            type: string
                                    required:
                                        - name
                                    type: object
                                type: array
                                x-kubernetes-list-type: atomic
                            defaultSkillRefs:
                                description: |-
                                    DefaultSkillRefs lists Skill names that are automatically attached to
                                    any AgentRun using this mode (their required MCP servers come along).
                                items:
                                    description: NamedRef references another namespaced resource by name.
                                    properties:
                                        name:
                                            type: string
                                    required:
                                        - name
                                    type: object
                                type: array
                                x-kubernetes-list-type: atomic
                            description:
                                type: string
                            displayName:
                                type: string
                            executionStrategy:
                                description: ModeExecutionStrategy controls how work is distributed.
                                enum:
                                    - serial
                                    - parallel
                                    - pipeline
                                type: string
                            instructions:
                                description: |-
                                    Instructions is a rich behavioral prompt loaded into the agent's system context.
                                    Defines mode philosophy, workflow, constraints, and behavioral rules.
                                type: string
                            name:
                                type: string
                            permissionMode:
                                description: |-
                                    PermissionMode optionally clamps the run's effective permission mode.
                                    The effective mode is the most restrictive of this value and the
                                    RuntimeProfile's security.permissionMode: a mode template can restrict
                                    but never grant. The review mode sets read-only so reviewers cannot
                                    edit code regardless of the repository's RuntimeProfile.
                                enum:
                                    - read-only
                                    - workspace-write
                                    - danger-full-access
                                type: string
                            version:
                                type: string
                        required:
                            - category
                            - name
                            - version
                        type: object
                    status:
                        description: ModeTemplateStatus defines the observed state of ModeTemplate.
                        properties:
                            conditions:
                                items:
                                    description: Condition contains details for one aspect of the current state of this API Resource.
                                    properties:
                                        lastTransitionTime:
                                            description: |-
                                                lastTransitionTime is the last time the condition transitioned from one status to another.
                                                This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                                            format: date-time
                                            type: string
                                        message:
                                            description: |-
                                                message is a human readable message indicating details about the transition.
                                                This may be an empty string.
                                            maxLength: 32768
                                            type: string
                                        observedGeneration:
                                            description: |-
                                                observedGeneration represents the .metadata.generation that the condition was set based upon.
                                                For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                                                with respect to the current state of the instance.
                                            format: int64
                                            minimum: 0
                                            type: integer
                                        reason:
                                            description: |-
                                                reason contains a programmatic identifier indicating the reason for the condition's last transition.
                                                Producers of specific condition types may define expected values and meanings for this field,
                                                and whether the values are considered a guaranteed API.
                                                The value should be a CamelCase string.
                                                This field may not be empty.
                                            maxLength: 1024
                                            minLength: 1
                                            pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                                            type: string
                                        status:
                                            description: status of the condition, one of True, False, Unknown.
                                            enum:
                                                - "True"
                                                - "False"
                                                - Unknown
                                            type: string
                                        type:
                                            description: type of condition in CamelCase or in foo.example.com/CamelCase.
                                            maxLength: 316
                                            pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                                            type: string
                                    required:
                                        - lastTransitionTime
                                        - message
                                        - reason
                                        - status
                                        - type
                                    type: object
                                type: array
                                x-kubernetes-list-map-keys:
                                    - type
                                x-kubernetes-list-type: map
                            phase:
                                type: string
                        type: object
                required:
                    - spec
                type: object
          served: true
          storage: true
          subresources:
            status: {}
{{- end }}
