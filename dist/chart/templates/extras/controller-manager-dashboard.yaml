apiVersion: v1
kind: Service
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "gratefulagents.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    name: {{ include "gratefulagents.resourceName" (dict "suffix" "controller-manager-dashboard" "context" $) }}
    namespace: {{ .Release.Namespace }}
spec:
    type: {{ .Values.dashboard.service.type }}
    ports:
        - name: dashboard
          port: 8090
          protocol: TCP
          targetPort: dashboard
          {{- if and (eq .Values.dashboard.service.type "NodePort") .Values.dashboard.service.nodePort }}
          nodePort: {{ .Values.dashboard.service.nodePort }}
          {{- end }}
    selector:
        app.kubernetes.io/name: {{ include "gratefulagents.name" . }}
        control-plane: controller-manager
