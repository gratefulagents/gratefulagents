{{- if .Values.minio.enabled }}
{{- $name := include "gratefulagents.resourceName" (dict "suffix" "minio" "context" $) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: {{ $name }}-data
    namespace: {{ .Release.Namespace }}
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "gratefulagents.name" . }}
        app.kubernetes.io/component: minio
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
spec:
    accessModes: [ReadWriteOnce]
    {{- with .Values.minio.persistence.storageClassName }}
    storageClassName: {{ . }}
    {{- end }}
    resources:
        requests:
            storage: {{ .Values.minio.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "gratefulagents.name" . }}
        app.kubernetes.io/component: minio
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: {{ include "gratefulagents.name" . }}
            app.kubernetes.io/component: minio
    template:
        metadata:
            labels:
                app.kubernetes.io/name: {{ include "gratefulagents.name" . }}
                app.kubernetes.io/component: minio
                app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
            containers:
                - name: minio
                  image: {{ .Values.minio.image }}
                  args: ["server", "/data"]
                  env:
                    - name: MINIO_ROOT_USER
                      value: {{ .Values.minio.rootUser | quote }}
                    - name: MINIO_ROOT_PASSWORD
                      value: {{ .Values.minio.rootPassword | quote }}
                  ports:
                    - containerPort: 9000
                  {{- with .Values.minio.resources }}
                  resources: {{ toYaml . | nindent 20 }}
                  {{- end }}
                  volumeMounts:
                    - name: data
                      mountPath: /data
            volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: {{ $name }}-data
---
apiVersion: v1
kind: Service
metadata:
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "gratefulagents.name" . }}
        app.kubernetes.io/component: minio
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
spec:
    selector:
        app.kubernetes.io/name: {{ include "gratefulagents.name" . }}
        app.kubernetes.io/component: minio
    ports:
        - port: 9000
          targetPort: 9000
---
apiVersion: batch/v1
kind: Job
metadata:
    name: {{ $name }}-create-bucket
    namespace: {{ .Release.Namespace }}
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "gratefulagents.name" . }}
        app.kubernetes.io/component: minio
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    annotations:
        helm.sh/hook: post-install,post-upgrade
        helm.sh/hook-weight: "0"
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
    backoffLimit: 6
    template:
        spec:
            restartPolicy: OnFailure
            containers:
                - name: mc
                  image: {{ .Values.minio.mcImage }}
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      until mc alias set bundled http://{{ $name }}.{{ .Release.Namespace }}.svc:9000 {{ .Values.minio.rootUser }} {{ .Values.minio.rootPassword }}; do
                        sleep 2
                      done
                      mc mb --ignore-existing bundled/{{ .Values.minio.bucket }}
{{- end }}
