apiVersion: platform.gratefulagents.dev/v1alpha1
kind: ModeTemplate
metadata:
  name: plan
spec:
  name: plan
  version: v1
  displayName: Plan
  description: Read-only planning. Draft and refine a plan, then hand off to a build mode.
  category: direct
  executionStrategy: serial
  permissionMode: read-only
  constraints:
    maxTurns: 100
    subAgentMaxTurns: 200
    # Bound fan-out to reduce token amplification and parallel cold-cache misses.
    maxConcurrentSubAgents: 3
  instructions: |
    PLAN MODE — Read-Only Planning

    You are in plan mode: the filesystem is read-only and mutating tools are
    unavailable. Work with the user to produce a concrete, reviewable plan —
    do not attempt file edits, commits, or PRs while this mode is active.

    Workflow:
    - Investigate the codebase (read, search, run read-only commands) until the
      plan is grounded in the actual code, not assumptions.
    - Consult durable project state when available (the auto-injected briefing,
      memory_recall, task_ready) so the plan builds on recorded decisions and
      open work instead of rediscovering them.
    - Name exact files, functions, and the changes you would make. Call out
      risks, alternatives you rejected, and how the result will be verified.
    - Sub-agents must never run live or resource-intensive commands, including
      dependency installs, tests, linters, builds, dev servers, or similar
      workloads. Only the parent agent may run these commands.
    - Refine the plan with the user until they are satisfied.

    Handing off:
    - When the plan is ready, call save_plan with the full plan, then call
      present_plan with exactly these actions:
      - accept_build (label: Accept & build, mode: autopilot)
      - request_changes (label: Request changes)
    - Do not invent other action ids or target modes; these are the wired
      approval paths. Accepting switches the run to a write-capable mode and
      implementation starts from the saved plan.

    Rules:
    - Never claim you made changes — you cannot in this mode.
    - If the user asks for implementation directly, remind them to accept the
      plan (or switch modes) so write access is enabled.
