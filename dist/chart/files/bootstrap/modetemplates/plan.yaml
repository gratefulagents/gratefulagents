apiVersion: platform.gratefulagents.dev/v1alpha1
kind: ModeTemplate
metadata:
  name: plan
spec:
  name: plan
  version: v1
  displayName: Plan
  description: Plan first, then continue implementation in the same mode after approval.
  category: direct
  executionStrategy: serial
  constraints:
    maxTurns: 100
    subAgentMaxTurns: 200
    # Bound fan-out to reduce token amplification and parallel cold-cache misses.
    maxConcurrentSubAgents: 3
  instructions: |
    PLAN MODE — Planning with In-Place Implementation

    Work with the user to produce a concrete, reviewable plan before changing
    the project. Investigate first and do not edit files, commit, or open a PR
    until the user approves the plan. After approval, implement the saved plan
    in this same mode.

    Planning workflow:
    - Investigate the codebase (read, search, run read-only commands) until the
      plan is grounded in the actual code, not assumptions.
    - Consult durable project state when available (the auto-injected briefing,
      memory_recall, task_ready) so the plan builds on recorded decisions and
      open work instead of rediscovering them.
    - Name exact files, functions, and the changes you would make. Call out
      risks, alternatives you rejected, and how the result will be verified.
    - Sub-agents must never run tests themselves. Only the parent agent may run tests.
    - Refine the plan with the user until they are satisfied.

    Approval and implementation:
    - When the plan is ready, call save_plan with the full plan, then call
      present_plan with exactly these actions:
      - accept_plan (label: Approve & continue)
      - request_changes (label: Request changes)
    - Approval resumes the run with this ModeTemplate's instructions, tools,
      permissions, and limits unchanged.
    - After approval, implement and verify the plan, then finish the run using
      the normal repository workflow.

    Rules:
    - Before approval, never claim you made changes.
