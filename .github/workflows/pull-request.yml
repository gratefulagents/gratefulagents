name: Pull request

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  go-lint:
    name: Go lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: platform-app/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-app/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: platform-app
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: platform-app
        run: pnpm lint

  go-tests:
    name: Go tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: platform-app/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-app/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: platform-app
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: platform-app
        run: pnpm test

  installer-tests:
    name: Installer tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run installer tests
        run: make test-installers

  altstore-source-tests:
    name: AltStore source tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Test IPA metadata extraction
        run: python3 -m unittest scripts/extract-ios-ipa-metadata_test.py

      - name: Test AltStore source generation
        run: node --test scripts/generate-altstore-source.test.mjs

  docker-builds:
    name: Docker build (${{ matrix.image }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: controller
            dockerfile: ./Dockerfile
          - image: worker
            dockerfile: ./Dockerfile.worker
          - image: injector
            dockerfile: ./Dockerfile.injector
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          outputs: type=cacheonly
          cache-from: type=gha,scope=gratefulagents-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=gratefulagents-${{ matrix.image }},timeout=30m
          build-args: |
            VITE_BUILD_COMMIT=${{ github.sha }}
            APP_VERSION=dev

  tauri-build:
    name: Tauri macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: platform-app/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-app/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: platform-app/tauri/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: platform-app
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        working-directory: platform-app/tauri
        env:
          APPLE_SIGNING_IDENTITY: "-"
          VITE_APP_VERSION: 0.1.0-pr
          VITE_BUILD_COMMIT: ${{ github.sha }}
        run: pnpm tauri build --target aarch64-apple-darwin --bundles app --ci
