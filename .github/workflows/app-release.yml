name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Version and release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      release_created: ${{ steps.release.outputs.version != '' }}
      tag_name: ${{ format('v{0}', steps.release.outputs.version) }}
      version: ${{ steps.release.outputs.version }}
      release_sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create the semantic version tag and GitHub release
        id: release
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true

  images:
    name: ${{ matrix.image }} image
    needs: release
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: controller
            dockerfile: ./Dockerfile
          - image: worker
            dockerfile: ./Dockerfile.worker
          - image: injector
            dockerfile: ./Dockerfile.injector
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      output: image
      push: true
      context: .
      file: ${{ matrix.dockerfile }}
      build-args: |
        VITE_BUILD_COMMIT=${{ github.sha }}
        APP_VERSION=${{ needs.release.outputs.version || 'dev' }}
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-scope: gratefulagents-${{ matrix.image }}
      cache-mode: max
      meta-images: ghcr.io/gratefulagents/${{ matrix.image }}
      meta-tags: |
        type=raw,value=main
        type=raw,value=${{ github.sha }}
        type=raw,value=latest,enable=${{ needs.release.outputs.release_created == 'true' }}
        type=raw,value=${{ needs.release.outputs.tag_name || 'not-a-release' }},enable=${{ needs.release.outputs.release_created == 'true' }}
      set-meta-labels: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

  website:
    name: GitHub Pages website
    needs: release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: website/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install website dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Build website
        working-directory: website
        run: pnpm check

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  desktop:
    name: Tauri ${{ matrix.name }}
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            runner: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            linux: false
            bundle_targets: '["app", "dmg"]'
          - name: Linux AMD64
            runner: ubuntu-24.04
            args: ""
            rust_target: ""
            linux: true
            bundle_targets: '["deb", "rpm", "appimage"]'
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            args: ""
            rust_target: ""
            linux: true
            bundle_targets: '["deb", "rpm", "appimage"]'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: platform-app/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-app/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: platform-app/tauri/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install frontend dependencies
        working-directory: platform-app
        run: pnpm install --frozen-lockfile

      - name: Configure release bundles
        env:
          APP_VERSION: ${{ needs.release.outputs.version }}
          BUNDLE_TARGETS: ${{ matrix.bundle_targets }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for updater artifacts"
            exit 1
          fi
          jq -n \
            --arg version "${APP_VERSION}" \
            --argjson targets "${BUNDLE_TARGETS}" \
            '{version: $version, bundle: {createUpdaterArtifacts: true, targets: $targets}}' \
            > "${RUNNER_TEMP}/tauri-release.conf.json"

      - name: Build and upload desktop bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_APP_VERSION: ${{ needs.release.outputs.version }}
          VITE_BUILD_COMMIT: ${{ needs.release.outputs.release_sha }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: platform-app/tauri
          tauriScript: pnpm tauri
          args: ${{ matrix.args }} --config ${{ runner.temp }}/tauri-release.conf.json --ci
          tagName: ${{ needs.release.outputs.tag_name }}
          releaseDraft: false
          uploadUpdaterJson: false
          uploadUpdaterSignatures: true
          retryAttempts: 2

  android:
    name: Tauri Android ARM64
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: platform-app/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-app/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          link-to-sdk: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: platform-app/tauri/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: platform-app
        run: pnpm install --frozen-lockfile

      - name: Configure Android release
        env:
          APP_VERSION: ${{ needs.release.outputs.version }}
        run: |
          VERSION_CODE="$(git rev-list --count HEAD)"
          if [ "${VERSION_CODE}" -gt 2100000000 ]; then
            echo "::error::Commit count is too large for Android versionCode"
            exit 1
          fi
          jq -n \
            --arg version "${APP_VERSION}" \
            --argjson version_code "${VERSION_CODE}" \
            '{version: $version, bundle: {android: {versionCode: $version_code}}}' \
            > "${RUNNER_TEMP}/tauri-android.conf.json"

      - name: Initialize Android project
        working-directory: platform-app/tauri
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: pnpm tauri android init --config "${RUNNER_TEMP}/tauri-android.conf.json" --ci

      - name: Stamp Android icons
        working-directory: platform-app/tauri
        run: pnpm tauri icon app-icon.png

      - name: Build Android APK
        working-directory: platform-app/tauri
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          VITE_APP_VERSION: ${{ needs.release.outputs.version }}
          VITE_BUILD_COMMIT: ${{ needs.release.outputs.release_sha }}
        run: pnpm tauri android build --debug --apk --target aarch64 --config "${RUNNER_TEMP}/tauri-android.conf.json" --ci

      - name: Upload Android APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          APK="$(find platform-app/tauri/src-tauri/gen/android -type f -name '*.apk' -path '*debug*' -print -quit)"
          if [ -z "${APK}" ]; then
            echo "::error::Android build completed without producing a debug APK"
            exit 1
          fi
          ASSET="gratefulagents-${TAG_NAME}-android-arm64-debug.apk"
          cp "${APK}" "${ASSET}"
          gh release upload "${TAG_NAME}" "${ASSET}" --repo "${GITHUB_REPOSITORY}" --clobber

  ios:
    name: Tauri iOS ARM64
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: platform-app/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-app/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: platform-app/tauri/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: platform-app
        run: pnpm install --frozen-lockfile

      - name: Configure iOS release
        env:
          APP_VERSION: ${{ needs.release.outputs.version }}
        run: |
          jq -n --arg version "${APP_VERSION}" \
            '{version: $version}' > "${RUNNER_TEMP}/tauri-ios.conf.json"

      - name: Initialize iOS project
        working-directory: platform-app/tauri
        run: pnpm tauri ios init --config "${RUNNER_TEMP}/tauri-ios.conf.json" --ci

      - name: Stamp iOS icons
        working-directory: platform-app/tauri
        run: pnpm tauri icon app-icon.png

      - name: Build unsigned iOS IPA
        working-directory: platform-app/tauri
        env:
          VITE_APP_VERSION: ${{ needs.release.outputs.version }}
          VITE_BUILD_COMMIT: ${{ needs.release.outputs.release_sha }}
        run: pnpm tauri ios build --target aarch64 --no-sign --config "${RUNNER_TEMP}/tauri-ios.conf.json" --ci

      - name: Package and upload unsigned IPA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          IPA="platform-app/tauri/src-tauri/gen/apple/build/arm64/gratefulagents.ipa"
          if [ ! -f "${IPA}" ]; then
            echo "::error::Tauri iOS build completed without producing ${IPA}"
            exit 1
          fi
          ASSET="gratefulagents-${TAG_NAME}-ios-arm64-unsigned.ipa"
          cp "${IPA}" "${ASSET}"
          gh release upload "${TAG_NAME}" "${ASSET}" --repo "${GITHUB_REPOSITORY}" --clobber

  publish-release:
    name: Finalize release
    needs:
      - release
      - images
      - website
      - desktop
      - android
      - ios
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Build and upload updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
          APP_VERSION: ${{ needs.release.outputs.version }}
          RELEASE_SHA: ${{ needs.release.outputs.release_sha }}
        run: |
          ASSETS_JSON="$(mktemp)"
          PLATFORMS_JSON="$(mktemp)"
          RELEASE_API_URL="$(gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json apiUrl --jq .apiUrl)"
          RELEASE_ID="${RELEASE_API_URL##*/}"
          gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?per_page=100" > "${ASSETS_JSON}"
          printf '{}\n' > "${PLATFORMS_JSON}"

          while IFS= read -r signature_name; do
            asset_name="${signature_name%.sig}"
            case "${asset_name}" in
              *.app.tar.gz)
                platform_key="darwin-aarch64"
                ;;
              *.AppImage)
                case "${asset_name}" in
                  *aarch64*|*arm64*) platform_key="linux-aarch64" ;;
                  *) platform_key="linux-x86_64" ;;
                esac
                ;;
              *)
                continue
                ;;
            esac

            asset_download_url="$(jq -r --arg name "${asset_name}" '.[] | select(.name == $name) | .browser_download_url' "${ASSETS_JSON}")"
            signature_id="$(jq -r --arg name "${signature_name}" '.[] | select(.name == $name) | .id' "${ASSETS_JSON}")"
            if [ -z "${asset_download_url}" ] || [ "${asset_download_url}" = "null" ] || [ -z "${signature_id}" ] || [ "${signature_id}" = "null" ]; then
              echo "::error::Missing updater artifact or signature for ${signature_name}"
              exit 1
            fi

            signature="$(gh api -H 'Accept: application/octet-stream' "repos/${GITHUB_REPOSITORY}/releases/assets/${signature_id}")"
            jq \
              --arg key "${platform_key}" \
              --arg url "${asset_download_url}" \
              --arg signature "${signature}" \
              '.[$key] = {signature: $signature, url: $url}' \
              "${PLATFORMS_JSON}" > "${PLATFORMS_JSON}.next"
            mv "${PLATFORMS_JSON}.next" "${PLATFORMS_JSON}"
          done < <(jq -r '.[] | select(.name | endswith(".sig")) | .name' "${ASSETS_JSON}")

          for platform_key in darwin-aarch64 linux-x86_64 linux-aarch64; do
            if [ -z "$(jq -r --arg key "${platform_key}" '.[$key] // empty | .url' "${PLATFORMS_JSON}")" ]; then
              echo "::error::Missing updater artifact for ${platform_key}"
              exit 1
            fi
          done

          jq -n \
            --arg version "${APP_VERSION}" \
            --arg notes "gratefulagents ${TAG_NAME} (${GITHUB_REPOSITORY}@${RELEASE_SHA})" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile platforms "${PLATFORMS_JSON}" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms[0]}' \
            > latest.json
          gh release upload "${TAG_NAME}" latest.json --repo "${GITHUB_REPOSITORY}" --clobber
