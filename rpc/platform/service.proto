  int64 generation = 5;
  repeated TeamRuntimeTask tasks = 6;
  AgentRunDelegationPolicy delegation_policy = 7;

  // status
  string phase = 10;
  int32 total_tasks = 11;
  int32 ready_tasks = 12;
  int32 running_tasks = 13;
