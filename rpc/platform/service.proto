// GitHubRepositoryTriggerSettings mirrors the user-configurable spec-level
// fields on a GitHubRepository trigger. Auth wiring (github_token_secret /
// github_app) and repository identity are intentionally not included: those
// are fixed by onboarding.
message GitHubRepositoryTriggerSettings {
  string poll_interval = 1; // Go duration string, e.g. "60s"; empty = controller default.
  string webhook_secret = 2; // Secret name for classic per-resource webhook HMAC validation.
  string trigger_keyword = 3; // Bot mention keyword; empty = controller default "@agent".
  bool cancel_runs_on_issue_close = 4;
  repeated string auth_allowed_users = 5; // GitHub logins; empty = owners/members/collaborators.
  repeated string auth_deny_users = 6;
  // Omission means disabled by default; set false explicitly to enable.
  optional bool review_loop_disabled = 7;
  int32 review_loop_max_rounds = 8; // 0 = controller default (3).
  string reviewer_mode_ref = 9; // ModeTemplate name; empty = default reviewer mode.
  string reviewer_mode_version = 10;
  string reviewer_mode_channel = 11;
  // Maintainer (standing repository supervisor). Omission keeps the
  // maintainer disabled; opt in explicitly per repository.
  optional bool maintainer_enabled = 12;
  int32 maintainer_max_concurrent_dispatches = 13; // 0 = controller default (2).
  int32 maintainer_max_dispatches_per_day = 14; // 0 = controller default (10).
  string maintainer_standup_interval = 15; // Go duration string; empty = controller default "12h".
  string maintainer_mode_ref = 16; // ModeTemplate name; empty = default "maintainer".
  string maintainer_model = 17; // Empty inherits the repository defaults' model.
  // Dangerous: allows the maintainer to merge approved, non-draft PRs.
  bool maintainer_allow_pr_merge = 18;
  // Rollbackable waiter/delivery migration mode: Controller, DualRead, or Legacy.
  // Omission preserves the current mode on update for older clients.
  optional string maintainer_work_item_cutover = 19;
}

// GitHubRepositoryMaintainerStatus mirrors GitHubRepositoryStatus.maintainer.
message GitHubRepositoryMaintainerStatus {
  string run_name = 1;
  int64 last_wake_unix = 2;
  int32 dispatches_today = 3;
  int64 last_report_time_unix = 4;
  string last_report_state = 5; // healthy | needs_attention | blocked
  string last_report_summary = 6;
}

