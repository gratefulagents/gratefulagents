syntax = "proto3";

package platform.v1;
option go_package = "github.com/gratefulagents/gratefulagents/rpc/platform";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service PlatformService {
  rpc ListAgentRuns(ListAgentRunsRequest) returns (ListAgentRunsResponse);
  rpc GetAgentRun(GetAgentRunRequest) returns (AgentRun);
  rpc WatchAgentRuns(WatchAgentRunsRequest) returns (stream AgentRunEvent);
  rpc WatchAgentRun(WatchAgentRunRequest) returns (stream AgentRun);
  rpc GetActivityLog(GetActivityLogRequest) returns (GetActivityLogResponse);
  rpc GetActivityEntryDetail(GetActivityEntryDetailRequest) returns (GetActivityEntryDetailResponse);
  rpc WatchActivityLog(GetActivityLogRequest) returns (stream GetActivityLogResponse);
  rpc GetAgentRunUsage(GetAgentRunUsageRequest) returns (AgentRunUsageResponse);
  rpc GetObservabilityOverview(GetObservabilityOverviewRequest) returns (ObservabilityOverviewResponse);
  // GetAgentRunPullRequests returns the pull requests a run created along with
  // their CI checks and review threads, fetched live from GitHub.
  rpc GetAgentRunPullRequests(GetAgentRunPullRequestsRequest) returns (GetAgentRunPullRequestsResponse);
  rpc ListLinearProjects(ListLinearProjectsRequest) returns (ListLinearProjectsResponse);
  rpc WatchLinearProjects(WatchLinearProjectsRequest) returns (stream LinearProjectEvent);
  rpc SendAgentRunMessage(SendAgentRunMessageRequest) returns (SendAgentRunMessageResponse);
  // CancelAgentRunMessage withdraws a pending (queued or steering) user
  // message that the agent loop has not consumed yet. Fails with
  // FAILED_PRECONDITION once the message has been delivered.
  rpc CancelAgentRunMessage(CancelAgentRunMessageRequest) returns (CancelAgentRunMessageResponse);
  rpc CreateAgentRun(CreateAgentRunRequest) returns (AgentRun);
  rpc ListMyCredentials(ListMyCredentialsRequest) returns (MyCredentials);
  rpc UpdateMyCredentials(UpdateMyCredentialsRequest) returns (MyCredentials);
  // StartProviderOAuth starts a server-held OAuth session for browser clients.
  // Anthropic returns a manual-code authorization URL; OpenAI returns a device
  // code and verification URL. Provider tokens never pass through the browser.
  rpc StartProviderOAuth(StartProviderOAuthRequest) returns (ProviderOAuthStart);
  // CompleteProviderOAuth completes Anthropic's manual-code flow and stores the
  // resulting credentials in the calling user's namespace.
  rpc CompleteProviderOAuth(CompleteProviderOAuthRequest) returns (ProviderOAuthResult);
  // PollProviderOAuth advances OpenAI's device-code flow and stores credentials
  // after approval.
  rpc PollProviderOAuth(PollProviderOAuthRequest) returns (ProviderOAuthResult);
  // ShareMyCredentials copies some of the calling user's saved credentials to
  // another user by duplicating the secret material into that user's personal
  // namespace. It is a one-time copy: later edits by either user do not
  // propagate to the other.
  rpc ShareMyCredentials(ShareMyCredentialsRequest) returns (ShareMyCredentialsResponse);
  rpc ListSlackAgents(ListSlackAgentsRequest) returns (ListSlackAgentsResponse);
  rpc UpdateSlackAgent(UpdateSlackAgentRequest) returns (SlackAgent);
  rpc DeleteSlackAgent(DeleteSlackAgentRequest) returns (google.protobuf.Empty);
  rpc ListSlackWorkspaces(ListSlackWorkspacesRequest) returns (ListSlackWorkspacesResponse);
  rpc UpdateSlackWorkspace(UpdateSlackWorkspaceRequest) returns (SlackWorkspace);
  rpc DeleteSlackWorkspace(DeleteSlackWorkspaceRequest) returns (google.protobuf.Empty);
  rpc ListSlackDrafts(ListSlackDraftsRequest) returns (ListSlackDraftsResponse);
  // ListMCPServers lists the cluster-managed MCP server configs available in
  // the caller's namespace, for attaching to agents.
  rpc ListMCPServers(ListMCPServersRequest) returns (ListMCPServersResponse);
  // UpsertMCPServer creates or updates an MCP server config in the caller's
  // namespace from structured fields — no YAML required.
  rpc UpsertMCPServer(UpsertMCPServerRequest) returns (MCPServerInfo);
  // DeleteMCPServer removes an MCP server config from the caller's namespace.
  rpc DeleteMCPServer(DeleteMCPServerRequest) returns (google.protobuf.Empty);
  // ListSkills lists the skills (reusable agent instructions, inline or
  // git-sourced SKILL.md folders) available in the caller's namespace.
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
  // ListSkillCatalog browses or searches the public skills.sh catalog.
  rpc ListSkillCatalog(ListSkillCatalogRequest) returns (ListSkillCatalogResponse);
  // InstallSkillFromCatalog resolves a skills.sh catalog entry and creates an
  // inline Skill CRD in the caller's namespace.
  rpc InstallSkillFromCatalog(InstallSkillFromCatalogRequest) returns (SkillInfo);
  // UpsertSkill creates or updates a skill in the caller's namespace. Inline
  // skills carry instructions directly; git skills reference a repository
  // folder containing SKILL.md.
  rpc UpsertSkill(UpsertSkillRequest) returns (SkillInfo);
  // DeleteSkill removes a skill from the caller's namespace.
  rpc DeleteSkill(DeleteSkillRequest) returns (google.protobuf.Empty);
  // Namespaced dashboard resources always resolve to the verified caller's
  // personal namespace. These requests intentionally carry no namespace.
  rpc ListRuntimeProfiles(ListRuntimeProfilesRequest) returns (ListRuntimeProfilesResponse);
  rpc CreateRuntimeProfile(CreateRuntimeProfileRequest) returns (RuntimeProfile);
  rpc UpdateRuntimeProfile(UpdateRuntimeProfileRequest) returns (RuntimeProfile);
  rpc DeleteRuntimeProfile(DeleteRuntimeProfileRequest) returns (google.protobuf.Empty);
  rpc ListMCPPolicies(ListMCPPoliciesRequest) returns (ListMCPPoliciesResponse);
  rpc CreateMCPPolicy(CreateMCPPolicyRequest) returns (MCPPolicy);
  rpc UpdateMCPPolicy(UpdateMCPPolicyRequest) returns (MCPPolicy);
  rpc DeleteMCPPolicy(DeleteMCPPolicyRequest) returns (google.protobuf.Empty);
  rpc ListGuardrailPolicies(ListGuardrailPoliciesRequest) returns (ListGuardrailPoliciesResponse);
  rpc CreateGuardrailPolicy(CreateGuardrailPolicyRequest) returns (GuardrailPolicy);
  rpc UpdateGuardrailPolicy(UpdateGuardrailPolicyRequest) returns (GuardrailPolicy);
  rpc DeleteGuardrailPolicy(DeleteGuardrailPolicyRequest) returns (google.protobuf.Empty);
  // ModeTemplate and RoleInstruction are cluster-scoped catalogs. Every
  // authenticated user may browse, create, and edit mode templates. Deleting
  // mode templates and mutating role instructions requires an admin.
  rpc ListModeTemplates(ListModeTemplatesRequest) returns (ListModeTemplatesResponse);
  rpc CreateModeTemplate(CreateModeTemplateRequest) returns (ModeTemplate);
  rpc UpdateModeTemplate(UpdateModeTemplateRequest) returns (ModeTemplate);
  rpc DeleteModeTemplate(DeleteModeTemplateRequest) returns (google.protobuf.Empty);
  rpc ListRoleInstructions(ListRoleInstructionsRequest) returns (ListRoleInstructionsResponse);
  rpc CreateRoleInstruction(CreateRoleInstructionRequest) returns (RoleInstruction);
  rpc UpdateRoleInstruction(UpdateRoleInstructionRequest) returns (RoleInstruction);
  rpc DeleteRoleInstruction(DeleteRoleInstructionRequest) returns (google.protobuf.Empty);
  // ListRuntimeImages lists the curated worker image catalog (language →
  // official image) offered when configuring projects, agents, and runs.
  rpc ListRuntimeImages(ListRuntimeImagesRequest) returns (ListRuntimeImagesResponse);
  rpc GetMySoul(GetMySoulRequest) returns (Soul);
  rpc UpdateMySoul(UpdateMySoulRequest) returns (Soul);
  // Personal role-model preferences override cluster RoleInstruction model
  // defaults for runs created by the calling user.
  rpc GetMyRoleModelPreferences(GetMyRoleModelPreferencesRequest) returns (RoleModelPreferences);
  rpc UpdateMyRoleModelPreferences(UpdateMyRoleModelPreferencesRequest) returns (RoleModelPreferences);
  // GetMyGitIdentity returns the calling user's git commit identity (empty
  // when none is saved).
  rpc GetMyGitIdentity(GetMyGitIdentityRequest) returns (GitIdentity);
  // UpdateMyGitIdentity saves the calling user's git author identity. The
  // gratefulagents GitHub App is always credited as a co-author.
  rpc UpdateMyGitIdentity(UpdateMyGitIdentityRequest) returns (GitIdentity);
  rpc DeleteAgentRun(DeleteAgentRunRequest) returns (google.protobuf.Empty);
  rpc CancelAgentRun(CancelAgentRunRequest) returns (AgentRun);
  // PromoteAgentRun marks a non-terminal run as Succeeded on the user's
  // request, tearing down its runner the same way cancellation does.
  rpc PromoteAgentRun(PromoteAgentRunRequest) returns (AgentRun);
  // InterruptAgentRun stops the run's in-flight turn (current model call,
  // running tools, and active sub-agents) without terminating the run; the
  // session stays alive awaiting the next user message.
  rpc InterruptAgentRun(InterruptAgentRunRequest) returns (InterruptAgentRunResponse);
  rpc RetryAgentRun(RetryAgentRunRequest) returns (AgentRun);
  rpc RenameAgentRun(RenameAgentRunRequest) returns (AgentRun);
  rpc UpdateAgentRunRuntimeConfig(UpdateAgentRunRuntimeConfigRequest) returns (AgentRun);
  // Overseers are attached per run. Mode/model are fixed for one attachment;
  // authority, cadence, and intervention cap can be tuned live.
  rpc AttachAgentRunOverseer(AttachAgentRunOverseerRequest) returns (AgentRun);
  rpc UpdateAgentRunOverseer(UpdateAgentRunOverseerRequest) returns (AgentRun);
  rpc DetachAgentRunOverseer(DetachAgentRunOverseerRequest) returns (AgentRun);
  rpc ExtendAgentRunRuntime(ExtendAgentRunRuntimeRequest) returns (AgentRun);
  rpc CreateTeamChildRun(CreateTeamChildRunRequest) returns (TeamChildRunStatus);
  rpc ListTeamChildRuns(ListTeamChildRunsRequest) returns (ListTeamChildRunsResponse);
  rpc GetTeamChildRunStatus(GetTeamChildRunStatusRequest) returns (TeamChildRunStatus);
  rpc GetTeamChildRunLogs(GetTeamChildRunLogsRequest) returns (TeamChildRunLogs);
  rpc GetTeamChildRunArtifact(GetTeamChildRunArtifactRequest) returns (TeamChildRunArtifact);
  rpc SendTeamChildMessage(SendTeamChildMessageRequest) returns (TeamChildRunStatus);
  rpc GetAgentRunTeamStatus(GetAgentRunTeamStatusRequest) returns (AgentRunTeamSummary);
  rpc WaitForTeamRunChange(WaitForTeamRunChangeRequest) returns (WaitForTeamRunChangeResponse);
  rpc CancelTeamChildRun(CancelTeamChildRunRequest) returns (TeamChildRunStatus);
  rpc RetryTeamChildRun(RetryTeamChildRunRequest) returns (TeamChildRunStatus);
  rpc GetTeamApprovalStatus(GetTeamApprovalStatusRequest) returns (TeamApprovalStatus);
  rpc GetLinearProject(GetLinearProjectRequest) returns (LinearProject);
  rpc GetTeamRuntime(GetTeamRuntimeRequest) returns (TeamRuntime);
  rpc WatchTeamRuntime(WatchTeamRuntimeRequest) returns (stream TeamRuntime);
  rpc ListAvailableModels(ListAvailableModelsRequest) returns (ListAvailableModelsResponse);
  rpc GetDiff(GetDiffRequest) returns (GetDiffResponse);
  rpc WatchDiff(GetDiffRequest) returns (stream GetDiffResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc ListWorkspaceFiles(ListWorkspaceFilesRequest) returns (ListWorkspaceFilesResponse);
  rpc CloneRepository(CloneRepositoryRequest) returns (CloneRepositoryResponse);
  rpc ListRepositories(ListRepositoriesRequest) returns (ListRepositoriesResponse);
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc UpdateLinearProjectInstructions(UpdateLinearProjectInstructionsRequest) returns (UpdateLinearProjectInstructionsResponse);
  rpc CreateLinearProject(CreateLinearProjectRequest) returns (LinearProject);
  rpc UpdateLinearProject(UpdateLinearProjectRequest) returns (LinearProject);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc GetProject(GetProjectRequest) returns (Project);
  rpc WatchProjects(WatchProjectsRequest) returns (stream ProjectEvent);
  rpc CreateProject(CreateProjectRequest) returns (Project);
  rpc UpdateProject(UpdateProjectRequest) returns (Project);
  rpc CreateProjectTrigger(CreateProjectTriggerRequest) returns (Project);
  rpc UpdateProjectTrigger(UpdateProjectTriggerRequest) returns (Project);
  rpc DeleteProjectTrigger(DeleteProjectTriggerRequest) returns (google.protobuf.Empty);
  rpc SetProjectTriggerEnabled(SetProjectTriggerEnabledRequest) returns (Project);
  rpc DeleteProject(DeleteProjectRequest) returns (google.protobuf.Empty);
  rpc ListConnections(ListConnectionsRequest) returns (ListConnectionsResponse);
  rpc CreateConnection(CreateConnectionRequest) returns (Connection);
  rpc UpdateConnection(UpdateConnectionRequest) returns (Connection);
  rpc DeleteConnection(DeleteConnectionRequest) returns (google.protobuf.Empty);
  // Durable project content lives independently of any Git repository or run
  // sandbox. Mutations require collaborator access; reads require viewer access.
  rpc ListProjectContent(ListProjectContentRequest) returns (ListProjectContentResponse);
  rpc GetProjectContent(GetProjectContentRequest) returns (GetProjectContentResponse);
  rpc CreateProjectContent(CreateProjectContentRequest) returns (ProjectContent);
  rpc UpdateProjectContent(UpdateProjectContentRequest) returns (ProjectContent);
  rpc DuplicateProjectContent(DuplicateProjectContentRequest) returns (ProjectContent);
  rpc ListProjectContentVersions(ListProjectContentVersionsRequest) returns (ListProjectContentVersionsResponse);
  rpc RestoreProjectContentVersion(RestoreProjectContentVersionRequest) returns (ProjectContent);
  rpc DeleteProjectContent(DeleteProjectContentRequest) returns (google.protobuf.Empty);
  rpc ListGitHubRepositories(ListGitHubRepositoriesRequest) returns (ListGitHubRepositoriesResponse);
  rpc GetGitHubRepository(GetGitHubRepositoryRequest) returns (GitHubRepository);
  rpc ListMaintainerWorkItems(ListMaintainerWorkItemsRequest) returns (ListMaintainerWorkItemsResponse);
  rpc WatchGitHubRepositories(WatchGitHubRepositoriesRequest) returns (stream GitHubRepositoryEvent);
  rpc GetGitHubAppConfig(google.protobuf.Empty) returns (GitHubAppConfig);
  rpc ListGitHubAppInstallations(google.protobuf.Empty) returns (ListGitHubAppInstallationsResponse);
  rpc ListGitHubAppInstallationRepositories(ListGitHubAppInstallationRepositoriesRequest) returns (ListGitHubAppInstallationRepositoriesResponse);
  rpc CreateGitHubRepositoryFromInstallation(CreateGitHubRepositoryFromInstallationRequest) returns (GitHubRepository);
  rpc CreateGitHubRepositoryFromToken(CreateGitHubRepositoryFromTokenRequest) returns (GitHubRepository);
  rpc UpdateGitHubRepository(UpdateGitHubRepositoryRequest) returns (GitHubRepository);
  rpc ListCrons(ListCronsRequest) returns (ListCronsResponse);
  rpc GetCron(GetCronRequest) returns (Cron);
  rpc WatchCrons(WatchCronsRequest) returns (stream CronEvent);
  rpc CreateCron(CreateCronRequest) returns (Cron);
  rpc UpdateCron(UpdateCronRequest) returns (Cron);
  rpc DeleteCron(DeleteCronRequest) returns (google.protobuf.Empty);
  rpc ListAvailableModes(ListAvailableModesRequest) returns (ListAvailableModesResponse);
  rpc GetModeTemplate(GetModeTemplateRequest) returns (ModeTemplate);
  rpc SwitchAgentRunMode(SwitchAgentRunModeRequest) returns (SwitchAgentRunModeResponse);
  rpc GetAgentTrace(GetAgentTraceRequest) returns (GetAgentTraceResponse);
  rpc WatchAgentTrace(GetAgentTraceRequest) returns (stream GetAgentTraceResponse);
  // Returns a bounded, error-only view of durable runtime events and current
  // worker pod logs. Successful traces and ordinary stdout are never returned.
  rpc GetAgentRunErrors(GetAgentRunErrorsRequest) returns (GetAgentRunErrorsResponse);
  // Returns a bounded tail of the AgentRun worker container's output.
  rpc GetAgentRunLogs(GetAgentRunLogsRequest) returns (GetAgentRunLogsResponse);
  // Bundles the run metadata, activity log and OTel trace into a zip archive
  // for download. Works for both live and terminal runs.
  rpc ExportAgentRunArchive(ExportAgentRunArchiveRequest) returns (ExportAgentRunArchiveResponse);

  // Collaboration: resource sharing
  rpc ShareResource(ShareResourceRequest) returns (ShareResourceResponse);
  rpc RevokeShare(RevokeShareRequest) returns (google.protobuf.Empty);
  rpc UpdateSharePermission(UpdateSharePermissionRequest) returns (ResourceShareInfo);
  rpc ListShares(ListSharesRequest) returns (ListSharesResponse);
  rpc ListSharedWithMe(ListSharedWithMeRequest) returns (ListSharedWithMeResponse);

  // Collaboration: notifications
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (google.protobuf.Empty);

  // Collaboration: presence
  rpc SendPresenceHeartbeat(PresenceHeartbeatRequest) returns (google.protobuf.Empty);
  rpc GetPresence(GetPresenceRequest) returns (GetPresenceResponse);

  // GetMyOpenAIUsage returns account data available through the calling
  // user's current ChatGPT OAuth credential. Provider tokens and raw
  // credential material never leave the server.
  rpc GetMyOpenAIUsage(GetMyOpenAIUsageRequest) returns (MyOpenAIUsage);
}

message ListAgentRunsRequest {
  string namespace = 1; // Optional: filter by namespace (empty = all)
  bool owned_by_me = 2; // If true, return only runs owned by the caller
  bool shared_with_me = 3; // If true, return only runs shared with the caller
}

message ListAgentRunsResponse {
  repeated AgentRun runs = 1;
}

message GetAgentRunRequest {
  string namespace = 1;
  string name = 2;
}

message DeleteAgentRunRequest {
  string namespace = 1;
  string name = 2;
}

message CancelAgentRunRequest {
  string namespace = 1;
  string name = 2;
}

message PromoteAgentRunRequest {
  string namespace = 1;
  string name = 2;
}

message InterruptAgentRunRequest {
  string namespace = 1;
  string name = 2;
}

message InterruptAgentRunResponse {}

message RetryAgentRunRequest {
  string namespace = 1;
  string name = 2;
  string message = 3;
  // Stable client-generated key. Replaying the same retry request appends one
  // resume message and applies one wake counter transition.
  string idempotency_key = 4;
}

message RenameAgentRunRequest {
  string namespace = 1;
  string name = 2;
  string display_name = 3;
}

message UpdateAgentRunRuntimeConfigRequest {
  string namespace = 1;
  string name = 2;
  // provider optionally changes the active provider. Empty keeps the current
  // provider inferred from the run model prefix.
  string provider = 3;
  // model optionally changes the active model. When provider is set, this must
  // be either bare or prefixed with the same provider.
  string model = 4;
  // update_reasoning_level disambiguates proto3 empty string: when true,
  // reasoning_level is applied and an empty value clears the run-level override.
  bool update_reasoning_level = 5;
  // reasoning_level is one of: none, low, medium, high, xhigh, max. Empty uses
  // the provider/model default when update_reasoning_level is true.
  string reasoning_level = 6;
}

message WatchAgentRunsRequest {
  string namespace = 1; // Optional: filter by namespace (empty = all)
}

message WatchAgentRunRequest {
  string namespace = 1;
  string name = 2;
}

message AgentRunEvent {
  string type = 1; // "ADDED", "MODIFIED", "DELETED"
  AgentRun run = 2;
}

message GetActivityLogRequest {
  string namespace = 1;
  string name = 2;
  // Watch resume/delta cursor: only events with event_id > since_event_id are
  // of interest. 0 means "from the beginning".
  int64 since_event_id = 3;
  // Watch: opt in to delta frames. The first frame is a full snapshot
  // (reset=true); subsequent frames carry only appended entries. Servers that
  // predate this field keep sending full snapshots (delta=false on frames).
  bool delta = 4;
  // When > 0, tool payloads (input_raw/output) larger than this many bytes are
  // truncated in the response and flagged via input_truncated/output_truncated.
  // Full payloads can be fetched lazily via GetActivityEntryDetail.
  int32 payload_preview_bytes = 5;
  // Unary pagination: return at most `limit` entries (the newest ones when
  // before_event_id is 0, otherwise the newest ones older than it). 0 = all.
  int32 limit = 6;
  int64 before_event_id = 7;
}

message GetActivityEntryDetailRequest {
  string namespace = 1;
  string name = 2;
  // Identifies the entry: event_id when known (Postgres-backed runs), falling
  // back to tool_use_id lookup.
  int64 event_id = 3;
  string tool_use_id = 4;
}

message GetActivityEntryDetailResponse {
  // Full, untruncated tool payloads for the requested entry.
  string input_raw = 1;
  string output = 2;
}

message GetAgentRunUsageRequest {
  string namespace = 1;
  string name = 2;
}

message UsageTotals {
  int64 input_tokens = 1;
  int64 output_tokens = 2;
  int64 cache_read_input_tokens = 3;
  int64 cache_creation_input_tokens = 4;
  int64 total_tokens = 5;
  bool tokens_known = 6;
}

message UsageAttempt {
  string attempt_id = 1;
  string agent_name = 2;
  string task_id = 3;
  reserved 4, 5;
  string model = 6;
  string provider = 7;
  UsageTotals usage = 8;
  int64 timestamp_unix = 9;
  bool is_subagent = 10;
  string phase = 11;
  string step = 12;
}

message UsageTask {
  string task_id = 1;
  string agent_name = 2;
  bool is_top_level = 3;
  UsageTotals usage = 4;
  repeated UsageAttempt attempts = 5;
}

message UsagePhase {
  string phase = 1;
  UsageTotals usage = 2;
  repeated UsageTask tasks = 3;
}

message AgentRunUsageResponse {
  UsageTotals summary = 1;
  reserved 2;
  repeated UsageTask top_level_tasks = 3;
  repeated UsageTask subagent_tasks = 4;
  bool is_complete = 5;
  bool is_available = 6;
  repeated UsagePhase phases = 7;
}

message GetObservabilityOverviewRequest {
  string namespace = 1;
  google.protobuf.Timestamp start = 2;
  google.protobuf.Timestamp end = 3;
  int64 bucket_seconds = 4;
}

message ObservabilityTotals {
  int64 runs = 1;
  double cost_usd = 2;
  int64 input_tokens = 3;
  int64 output_tokens = 4;
  int64 tool_calls = 5;
  int64 tool_errors = 6;
  int64 subagents = 7;
  int64 subagent_failures = 8;
  int64 llm_attempts = 9;
  int64 llm_failures = 10;
  int64 compactions = 11;
  int64 tokens_reclaimed = 12;
  // Generation-attributed usage is derived from llm_attempt events in each
  // bucket. It is kept separate from run snapshot totals to avoid double-counting.
  double generation_cost_usd = 13;
  int64 generation_input_tokens = 14;
  int64 generation_output_tokens = 15;
}

message ObservabilityBucket {
  google.protobuf.Timestamp start = 1;
  ObservabilityTotals totals = 2;
}

message ObservabilityBreakdown {
  string name = 1;
  int64 count = 2;
  int64 errors = 3;
  double cost_usd = 4;
  int64 input_tokens = 5;
  int64 output_tokens = 6;
  double average_duration_ms = 7;
  double p95_duration_ms = 8;
}

message ObservabilityDataCompleteness {
  int64 sessions = 1;
  int64 sessions_with_metrics = 2;
  int64 sessions_with_activity = 3;
  bool metrics_complete = 4;
  bool activity_complete = 5;
  bool activity_truncated = 6;
}

message ObservabilityOverviewResponse {
  ObservabilityTotals totals = 1;
  repeated ObservabilityBucket buckets = 2;
  repeated ObservabilityBreakdown tools = 3;
  repeated ObservabilityBreakdown subagents = 4;
  repeated ObservabilityBreakdown models = 5;
  ObservabilityDataCompleteness data_completeness = 6;
  repeated string coverage_warnings = 7;
}

message GetActivityLogResponse {
  repeated ActivityEntry entries = 1;
  bool is_complete = 2;
  SubagentGraph subagent_graph = 3;
  // Highest event_id contained in (or represented by) this response. Clients
  // use it as the since_event_id cursor for watch resume.
  int64 last_event_id = 4;
  // True when this frame is a delta: `entries` contains only events appended
  // since the previous frame (or since_event_id). subagent_graph is only set
  // on delta frames when it changed.
  bool delta = 5;
  // True when the client must discard its buffer and replace it with
  // `entries` (first frame of a delta watch, or source changed).
  bool reset = 6;
  // Pagination metadata for unary page loads.
  int64 first_event_id = 7;
  bool has_more_before = 8;
}

// Pre-built subagent topology graph. Backend constructs this from activity
// entries so that frontends render it without custom grouping/status logic.
message SubagentGraph {
  string root_id = 1;
  repeated SubagentGraphNode nodes = 2;
  repeated SubagentGraphEdge edges = 3;
  repeated string orphan_ids = 4;
  bool has_subagents = 5;
  reserved 6, 7;
}

message SubagentGraphNode {
  string id = 1;
  string kind = 2;               // root, subagent, inline-subagent
  string parent_id = 3;
  string edge_kind = 4;          // spawned, inline-child
  string label = 5;
  string subtitle = 6;
  string description = 7;
  string detail = 8;
  string status = 9;
  string lineage = 10;           // complete, partial
  string lineage_reason = 11;
  int64  timestamp_unix = 12;
  int32  entry_count = 13;
  string task_id = 14;
  string tool_use_id = 15;
  string parent_call_id = 16;
  int32  tool_count = 17;
  int64  total_tokens = 18;
  int64  duration_ms = 19;
  string model = 20;
  double cost_usd = 21;
  int32  num_turns = 22;
  string stop_reason = 23;
  reserved 24;
  repeated string handoffs = 25;
  // Entry indices into GetActivityLogResponse.entries for detail drill-down.
  repeated int32 detail_entry_indices = 26;
  repeated string depends_on = 27;
  repeated string waiting_on = 28;
  string current_step = 29;
  string last_tool = 30;
  int32 files_written = 31;
  int32 messages_received = 32;
  string last_parent_message = 33;
  // Durable ActivityEntry.event_id references for detail drill-down. Unlike
  // detail_entry_indices (positions in one specific response's entries),
  // these stay valid for paginated/delta clients whose local entry buffer is
  // a different slice of the run's history.
  repeated int64 detail_entry_event_ids = 34;
}

message SubagentGraphEdge {
  string id = 1;
  string from = 2;
  string to = 3;
  string kind = 4;               // spawned, inline-child, depends-on
  string lineage = 5;            // complete, partial
}

message SourceRef {
  string kind = 1;
  string name = 2;
  string issue_id = 3;
  string issue_identifier = 4;
  string issue_url = 5;
}

message AgentRunTriggerRef {
  // kind retains the concrete runtime adapter kind for operational compatibility.
  string kind = 1;
  // name is the Project-local trigger identity (or the reserved "manual" entry point).
  string name = 2;
  string external_id = 3;
  string external_identifier = 4;
  string external_url = 5;
  // type is the concrete Project trigger provenance: manual, github, slack, cron, or linear.
  string type = 6;
}

message AgentRunProjectRef {
  string kind = 1;
  string name = 2;
}

message AgentRunDelegationPolicy {
  int32 max_children = 1;
  int32 max_depth = 2;
  bool parent_only = 3;
}

message AgentRunCompletionPolicy {
  bool require_approval = 1;
  reserved 2;
  reserved "require_verification";
}

message AgentRunTeamTask {
  string name = 1;
  string role = 2;
  string objective = 3;
  string runtime_profile_ref = 4;
  repeated string depends_on = 5;
  int32 max_retries = 6;
  string artifact_contract = 7;
}

message AgentRunTeamStep {
  string name = 1;
  string type = 2;
  repeated AgentRunTeamTask tasks = 3;
}

message AgentRunTeamSpec {
  repeated AgentRunTeamStep steps = 1;
  AgentRunDelegationPolicy delegation_policy = 2;
  reserved 3;
  reserved "verification_policy";
  AgentRunCompletionPolicy completion_policy = 4;
}

message AgentRunChildStatus {
  string name = 1;
  string namespace = 2;
  string step = 3;
  string role = 4;
  string phase = 5;
  string blocked_reason = 6;
}

message AgentRunTeamSummary {
  int32 current_step_index = 1;
  string current_step = 2;
  string approval_state = 3;
  reserved 4;
  reserved "verification_state";
  int32 total_children = 5;
  int32 pending_children = 6;
  int32 running_children = 7;
  int32 succeeded_children = 8;
  int32 failed_children = 9;
  int32 cancelled_children = 10;
  string blocked_reason = 11;
}

message PRLoopStatus {
