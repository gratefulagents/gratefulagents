  // credentials (and saved GitHub token) instead of the explicit secret fields
  // above.
  bool use_saved_credentials = 17;
  // defaults, when set, carries the full run defaults for the trigger and
  // takes precedence over the flattened legacy fields above (model, image,
  // timeout, provider, allowed_models, auth_mode, secret refs,
  // custom_instructions). The repository URL is still derived from owner/repo.
  AgentRunDefaults defaults = 18;
  // policies optionally provisions managed RuntimeProfile/MCPPolicy objects
  // for this trigger (see TriggerPolicies).
  TriggerPolicies policies = 19;
}

// CreateGitHubRepositoryFromTokenRequest onboards a repository with a GitHub
// token instead of a GitHub App installation: the caller's saved GitHub token
// (Settings) by default, or an explicit token provided in github_token.
message CreateGitHubRepositoryFromTokenRequest {
  string owner = 1;
  string repo = 2;
  // namespace is optional: it defaults to the caller's personal namespace.
  // Other namespaces are honored for admins and shared (non-personal)
  // namespaces only.
  string namespace = 3;
  string name = 4;
  // default_branch is optional; when empty it is read from the GitHub API.
  string default_branch = 5;
  string model = 6;
  string image = 7;
  string timeout = 8;
  string provider = 9;
  repeated string allowed_models = 10;
  string auth_mode = 11;
  string claude_api_key_secret = 12;
  string openai_oauth_secret = 13;
  repeated ProviderKeyRef provider_keys = 14;
  string custom_instructions = 15;
  // use_saved_credentials wires the trigger to the caller's saved per-provider
  // credentials instead of the explicit secret fields above.
  bool use_saved_credentials = 16;
  // github_token optionally provides a token stored in a Secret dedicated to
  // this trigger. When empty, the caller's saved GitHub token is used.
  string github_token = 17;
  // defaults, when set, carries the full run defaults for the trigger and
  // takes precedence over the flattened legacy fields above (model, image,
  // timeout, provider, allowed_models, auth_mode, secret refs,
  // custom_instructions). The repository URL is still derived from owner/repo.
  AgentRunDefaults defaults = 18;
  // policies optionally provisions managed RuntimeProfile/MCPPolicy objects
  // for this trigger (see TriggerPolicies).
  TriggerPolicies policies = 19;
}

// AgentRunDefaults mirrors the shared trigger defaults struct
// (api/triggers/v1alpha1 AgentRunDefaults): the settings applied to AgentRuns
// created by a trigger. Shared by trigger write RPCs (Cron today;
// GitHubRepository/LinearProject/Project migrate to it incrementally).
message AgentRunDefaults {
  // repo_url is the git repository to clone; empty = repoless runs.
  string repo_url = 1;
  // additional_repo_urls are extra repositories cloned under repos/<name>.
  repeated string additional_repo_urls = 2;
  string base_branch = 3;
  string image = 4;
  // model may carry a provider prefix (e.g. "anthropic/claude-sonnet-4-6");
  // when prefixed, provider is ignored.
  string model = 5;
  repeated string allowed_models = 6;
  string provider = 7;
  string auth_mode = 8;       // api-key | oauth
  string reasoning_level = 9; // none|low|medium|high|xhigh|max; empty = provider default
  string openai_base_url = 10;
  string openai_api = 11; // responses | chat-completions
  string timeout = 12;    // Go duration string, e.g. "30m"
  string custom_instructions = 13;
  // Secret names in the trigger's namespace.
  string claude_api_key_secret = 14; // deprecated upstream; prefer provider_keys
  string openai_oauth_secret = 15;   // required for auth_mode=oauth
  string github_token_secret = 16;
  repeated ProviderKeyRef provider_keys = 17;
  // Policy/mode references (names in the same namespace unless cluster-scoped).
  string runtime_profile_ref = 18;
  string mcp_policy_ref = 19;
  reserved 20;
  reserved "skill_package_refs";
  // mcp_server_refs / skill_refs list MCPServer and Skill names attached to
  // runs this trigger creates (a skill's required servers are auto-attached).
  repeated string mcp_server_refs = 24;
  repeated string skill_refs = 25;
  string workflow_mode = 21;  // auto | chat
  string mode_ref = 22;       // ModeTemplate name
  string execution_mode = 23; // linear | team
}

// TriggerPolicies carries the dashboard-managed runtime/MCP policy
// provisioning options shared by trigger write RPCs (same semantics as the
// flattened fields on Create/UpdateProjectRequest): when configure_* is true
// the server provisions or updates the RuntimeProfile/MCPPolicy named by the
// trigger defaults' runtime_profile_ref/mcp_policy_ref (deriving a managed
// name when the ref is empty) and points the trigger at it. When configure_*
// is false the refs in defaults are stored as-is.
message TriggerPolicies {
  bool configure_runtime_profile = 1;
  string permission_mode = 2; // read-only | workspace-write | danger-full-access
  string egress_mode = 3;     // unrestricted | restricted | disabled
  bool configure_mcp_policy = 4;
  string mcp_policy_default_action = 5; // Allow | Deny
  repeated string mcp_policy_allowed_servers = 6;
}

// UpdateGitHubRepositoryRequest replaces the trigger's run defaults with the
// request fields as a whole (same assign-on-save semantics as UpdateCron).
// The repository identity (owner/repo/repo_url) and the GitHub auth wiring
// (App installation or token secret) are not affected.
message UpdateGitHubRepositoryRequest {
  string namespace = 1;
  string name = 2;
  AgentRunDefaults defaults = 3;
  TriggerPolicies policies = 4;
  // use_saved_credentials rewires the trigger to the caller's saved
  // per-provider credentials for the selected provider/auth mode instead of
  // the explicit secret refs in defaults.
  bool use_saved_credentials = 5;
  // trigger_settings replaces the editable GitHubRepository spec-level trigger
  // settings as a whole. Omit it to preserve the current settings (for legacy
  // clients that only update run defaults).
  GitHubRepositoryTriggerSettings trigger_settings = 6;
  // use_reviewer_defaults controls the optional reviewer-specific settings.
  // Omit to preserve the stored value; false clears it and restores inheritance.
  optional bool use_reviewer_defaults = 7;
  AgentRunDefaults reviewer_defaults = 8;
  TriggerPolicies reviewer_policies = 9;
  bool use_saved_reviewer_credentials = 10;
}

// CreateLinearProject creates a Linear trigger in the verified caller's
// personal namespace. linear_api_key is write-only: the server stores it in a
// dedicated Secret and rolls that Secret (and managed policies) back if the
// trigger or ownership write fails.
message CreateLinearProjectRequest {
  string name = 1;
  string linear_api_key = 2;
  string project_id = 3;
  string team_id = 4;
  string poll_interval = 5; // positive Go duration; empty uses the CRD default.
  string approved_label = 6; // empty uses the CRD default.
  bool auto_create_tasks = 7;
  AgentRunDefaults defaults = 8;
  TriggerPolicies policies = 9;
  bool use_saved_credentials = 10;
}

// UpdateLinearProjectRequest replaces the trigger's run defaults with the
// request fields as a whole (same assign-on-save semantics as UpdateCron).
// The Linear wiring (API key secret, project/team ids) is not affected.
message UpdateLinearProjectRequest {
  string namespace = 1;
  string name = 2;
  AgentRunDefaults defaults = 3;
  TriggerPolicies policies = 4;
  bool use_saved_credentials = 5;
}

// ---- Cron messages ----

message ListCronsRequest {
  string namespace = 1;
}

message ListCronsResponse {
  repeated Cron crons = 1;
}

message GetCronRequest {
  string namespace = 1;
  string name = 2;
}

message WatchCronsRequest {
  string namespace = 1;
}

message CronEvent {
  string type = 1; // "ADDED", "MODIFIED", "DELETED"
  Cron cron = 2;
}

message CreateCronRequest {
  string namespace = 1;
  // name is optional; when empty the server derives one from the schedule.
  string name = 2;
  string schedule = 3;  // 5-field cron expression or robfig descriptor (@hourly)
  string time_zone = 4; // IANA zone; empty = UTC
  bool suspend = 5;
  string concurrency_policy = 6; // Allow | Forbid; empty = Forbid
  string prompt = 7;
  AgentRunDefaults defaults = 8;
  // use_saved_credentials wires the cron to the caller's saved per-provider
  // credentials (plus saved GitHub token) for the selected provider/auth mode,
  // instead of the explicit secret refs in defaults.
  bool use_saved_credentials = 9;
  // policies optionally provisions managed RuntimeProfile/MCPPolicy objects
  // for this trigger (see TriggerPolicies).
  TriggerPolicies policies = 10;
}

// UpdateCron replaces the Cron spec with the request fields as a whole
// (same assign-on-save semantics as UpdateProject).
message UpdateCronRequest {
  string namespace = 1;
  string name = 2;
  string schedule = 3;
  string time_zone = 4;
  bool suspend = 5;
  string concurrency_policy = 6; // Allow | Forbid; empty = Forbid
  string prompt = 7;
  AgentRunDefaults defaults = 8;
  bool use_saved_credentials = 9;
  // policies optionally provisions managed RuntimeProfile/MCPPolicy objects
  // for this trigger (see TriggerPolicies).
  TriggerPolicies policies = 10;
}

message DeleteCronRequest {
  string namespace = 1;
  string name = 2;
}

message Cron {
  string namespace = 1;
  string name = 2;
  string schedule = 3;
  string time_zone = 4;
  bool suspend = 5;
  string prompt = 6;
  string repo_url = 7;
  string concurrency_policy = 8; // Allow | Forbid; empty = Forbid
  // status
  int64 last_schedule_time_unix = 10;
  int64 next_schedule_time_unix = 11;
  int32 runs_created = 12;
  string last_run_name = 13;
  string last_error = 14;
  string condition_ready = 15;
  int64 created_at_unix = 16;
  // defaults
  string base_branch = 20;
  string model = 21;
  string image = 22;
  string timeout = 23;
  string claude_api_key_secret = 24;
  string github_token_secret = 25;
  string custom_instructions = 26;
  string provider = 27;
  repeated string allowed_models = 28;
  string auth_mode = 29;
  string openai_oauth_secret = 30;
  repeated ProviderKeyRef provider_keys = 31;
  // aggregated metrics
  ProjectMetrics metrics = 40;
  // defaults is the canonical AgentRunDefaults view. The flattened fields
  // 20-31 above are kept for wire compat; new UI should read defaults.
  AgentRunDefaults defaults = 41;
  // Resolved runtime/MCP policy view (from the referenced RuntimeProfile and
  // MCPPolicy), mirroring the Project read model.
  string permission_mode = 42;
  string egress_mode = 43;
  string mcp_policy_default_action = 44;
  repeated string mcp_policy_allowed_servers = 47;
  // ownership / sharing
  ResourceOwner owner = 45;
  string my_permission = 46; // populated per-request: "owner", "collaborator", "viewer", "admin"
}

// --- Trace waterfall ---

message GetAgentTraceRequest {
  string namespace = 1;
  string name = 2;
}

message GetAgentTraceResponse {
  string trace_id = 1;
  repeated TraceSpan spans = 2;
  int64 duration_ms = 3;
  string service_name = 4;
  bool is_complete = 5;  // true when the agent run has reached a terminal phase
}

message GetAgentRunErrorsRequest {
  string namespace = 1;
  string name = 2;
}

message AgentRunError {
  int64 timestamp_unix = 1;
  string message = 2;
  string source = 3; // activity, pod, or status
  string kind = 4;   // event/tool type when known
}

message GetAgentRunErrorsResponse {
  repeated AgentRunError errors = 1;
  bool is_complete = 2;
  bool truncated = 3;
}

message GetAgentRunLogsRequest {
  string namespace = 1;
  string name = 2;
  // Number of recent lines to return. The server applies a safe upper bound.
  int32 tail_lines = 3;
}

message GetAgentRunLogsResponse {
  string content = 1;
  string pod_name = 2;
  bool available = 3;
  bool is_complete = 4;
  bool truncated = 5;
}

message TraceSpan {
  string span_id = 1;
  string parent_span_id = 2;
  string operation_name = 3;
  int64 start_time_unix_us = 4;  // microseconds since epoch
  int64 duration_us = 5;         // microseconds
  string kind = 6;               // agent, llm.generation, tool.*, handoff, phase.*, etc.
  repeated TraceSpanTag tags = 7;
  bool is_error = 8;
  int32 child_count = 9;
}

message TraceSpanTag {
  string key = 1;
  string value = 2;
}

// --- Run export ---

message ExportAgentRunArchiveRequest {
  string namespace = 1;
  string name = 2;
}

message ExportAgentRunArchiveResponse {
  // Zip archive containing README.txt, run.json, activity.jsonl and
  // trace.json (when a trace is available).
  bytes archive = 1;
  // Suggested download filename, e.g. "my-run-export-20260705T120301Z.zip".
  string filename = 2;
}

