  string phase = 9;
  string resolved_name = 10;
  string resolved_description = 11;
  string resolved_sha = 12;
  // status_message carries the failure reason when phase is Error.
  string status_message = 13;
  // skills.sh provenance (empty for manually authored skills).
  string catalog_source = 14;
  string catalog_skill_id = 15;
  string catalog_url = 16;
  string catalog_hash = 17;
}

message ListSkillsRequest {}

message ListSkillsResponse {
