  string id = 1;
  string question = 2;
  repeated string options = 3;
  int64 requested_at_unix = 4;
}

// MaintainerWorkItem is the dashboard read model of a durable triage work item.
message MaintainerWorkItem {
  string namespace = 1;
  string name = 2;
  string repository_name = 3;
  int32 issue_number = 4;
  string issue_title = 5;
  string issue_url = 6;
  string issue_state = 7; // open | closed
  string disposition = 8; // Bounded | Decomposable | Discovery | Escalated | NotActionable
  string close_reason = 9; // not_planned | completed (NotActionable only)
  string phase = 10; // PendingTriage ... Delivered
  string evidence_summary = 11;
  bool ready_to_dispatch = 12;
  bool ready_to_merge = 13;
  repeated string unmet_requirements = 14;
  MaintainerWorkItemDecision pending_decision = 15;
  repeated MaintainerWorkItemAgentRun agent_runs = 16;
  repeated MaintainerWorkItemPullRequest pull_requests = 17;
  string delivery_summary = 18;
  int64 delivered_at_unix = 19;
  int64 created_at_unix = 20;
  int32 children_total = 21;
  int32 children_delivered = 22;
  int32 dependencies_total = 23;
  int32 dependencies_delivered = 24;
  // Latest durable command receipt (surfaces rejected/failed commands).
  string latest_command_type = 25;
  string latest_command_phase = 26; // Pending | Accepted | Succeeded | Rejected | Failed
  string latest_command_message = 27;
}

