  int32 max_rounds = 5;
  string role = 6;
  string implementer_run_name = 7;
  string review_verdict = 8;
  string review_summary = 9;
}

message AgentRun {
  string namespace = 1;
  string name = 2;

  // spec
  AgentRunTriggerRef trigger = 3;
  string repo_url = 4;
  string base_branch = 5;
  string branch_name = 6;
  string revision = 7;
  AgentRunProjectRef project = 8;
  string workflow_mode = 9;
  string model = 10;
  reserved 11; // was: provider
  string openai_base_url = 12;
  string execution_mode = 13;
  AgentRunTeamSpec team = 14;
  string image = 15;
  string intent_title = 16;
  string spec_artifact_kind = 17;
  string spec_artifact_name = 18;
  string spec_artifact_key = 19;
  string runtime_profile_ref = 20;
  string mcp_policy_ref = 21;
  reserved 22;
  reserved "skill_package_refs";
  // mcp_server_refs lists MCPServer names attached to this run; skill_refs
  // lists Skill names (a skill's required servers are auto-attached).
  repeated string mcp_server_refs = 139;
  repeated string skill_refs = 140;
  reserved 23, 24;
  reserved "approval_mode", "required_approvers";
  int32 max_turns = 25;
  string max_runtime = 26;
  int32 max_retries = 27;
  string claude_api_key_secret = 28;
  string github_token_secret = 29;
  reserved 30, 31, 32; // was: organization_ref, workspace_ref, post_approval_mode
  string auth_mode = 33;
  string openai_oauth_secret = 34;
  // additional_repo_urls are extra git repositories cloned into the run's
  // sandbox at startup (under repos/<name> next to the primary repository).
  repeated string additional_repo_urls = 35;

  // status
  string phase = 40;
  reserved 41, 42;
  string queue_state = 43;
  string blocked_reason = 44;
  int64 admitted_at_unix = 45;
  string sandbox_provider = 46;
  string sandbox_claim_ref = 47;
  string sandbox_ref = 48;
  string plan_artifact_kind = 49;
  string plan_artifact_name = 50;
  string plan_artifact_key = 51;
  string review_artifact_kind = 52;
  string review_artifact_name = 53;
  string review_artifact_key = 54;
  string activity_log_url = 55;
  string diff_url = 56;
  string resolved_permission_mode = 57;
  repeated string resolved_agent_kinds = 58;
  repeated string resolved_skills = 59;
  repeated string resolved_mcp_servers = 60;
  string cost_usd = 61;
  int64 input_tokens = 62;
  int64 output_tokens = 63;
  int32 tool_call_count = 64;
  int64 created_at_unix = 65;
  string current_plan = 66;
  reserved 67; // was: pending_question (now part of UserInputRequest)
  repeated ChatMessage conversation = 68;
  reserved 69, 70, 71, 72; // was: feasibility_verdict, feasibility_next_step, feasibility_impacted_areas, feasibility_caveats
  string current_step = 73;
  int32 session_number = 74;
  int32 agent_count = 75;
  int32 retry_count = 76;
  string last_error = 77;
  int64 started_at_unix = 78;
  int64 completed_at_unix = 79;
  repeated AgentActivity recent_activity = 80;
  string spec_markdown = 81;
  AgentRunTeamSummary team_summary = 82;
  repeated AgentRunChildStatus children = 83;
  bool send_ready = 85;
  string send_readiness_reason = 86;
  reserved 84, 87, 88; // was: session_mode, session_mode_source, session_mode_revision (plan is a ModeTemplate now — see mode_name)

  // Mode system fields (90-100).
  string mode_ref_name = 90;
  string mode_ref_version = 91;
  string mode_ref_channel = 92;
  string mode_name = 93;
  string mode_version = 94;
  int64 mode_revision = 95;
  reserved 96;
  string mode_category = 97;
  string mode_execution_strategy = 98;
  reserved 99; // was mode_transition_count
  repeated ModeTransitionEvent mode_transition_history = 100;

  // Completion fields (101-110).
  reserved 101, 102;
  reserved "verification_result";
  reserved 103;

  // Mode instructions from the pinned snapshot (111-120).
  string mode_instructions = 111;
  reserved 112;
  repeated EvidenceGateResult gate_results = 113;
  int32 finish_attempts = 122;

  // 123-126 were the flow-based phase machine (current_phase, defined_phases,
  // pending_approval_phase, phase_artifact_content). Phases were removed in
  // favor of chat-first modes; the numbers are reserved.
  reserved 123, 124, 125, 126;
  string resolved_model = 128; // effective top-level run model
  string resolved_reasoning_level = 129; // effective run-level reasoning override, if any

  // Collaboration (130+).
  ResourceOwner owner = 130;
  string my_permission = 131; // populated per-request: "owner", "collaborator", "viewer", "admin"
  PRLoopStatus pr_loop = 132;

  // PR/artifacts (114+).
  string pull_request_url = 114;
  string plan_summary = 115;
  string plan_updated_at = 116;

  // Interactivity (117+).
  repeated QuickAction pending_actions = 117;
  UserInputRequest user_input_request = 127;

  // Observability (120+).
  string trace_id = 120; // OTel trace ID for Jaeger lookup

  // Provider keys (121+).
  repeated ProviderKeyRef provider_keys = 121;

  // Display name (133+).
  string display_name = 133; // human-readable run title from status.displayName
  // Context budget for the active model: history compaction triggers at
  // context_trigger_tokens and shrinks the history to context_target_tokens.
  // context_tokens is the current context size (prompt-side tokens of the main
  // agent's latest generation), published by the agent. Zero when unknown.
  int64 context_trigger_tokens = 134;
  int64 context_target_tokens = 135;
  int64 context_tokens = 136;

  // All pull requests created during this run, in creation order.
  // pull_request_url (114) stays the most recent one for compatibility.
  repeated string pull_request_urls = 137;

  // Standing-run role for durable supervisor runs ("maintainer", "overseer");
  // empty for ordinary runs. Mirrors the standing-run role label.
  string standing_run_role = 145;

  // Additional per-provider OAuth secrets mounted on the run
  // (spec.secrets.providerOAuthSecrets) so it can switch to these providers
  // mid-run without a compute restart. secret_key is unused.
  repeated ProviderKeyRef provider_oauth_secrets = 138;

  // kubernetes_admin indicates the run has cluster-admin RBAC and platform
  // introspection tools enabled.
  bool kubernetes_admin = 141;

  // Optional per-run trajectory supervision and its controller-owned status.
  AgentRunOverseerConfig overseer = 142;
  AgentRunOverseerSummary overseer_summary = 143;
  bool overseer_detaching = 144;
}

// ProviderKeyRef references a K8s Secret holding an API key for a specific provider.
message ProviderKeyRef {
  string provider = 1;
  string secret_name = 2;
  string secret_key = 3; // key within the K8s Secret; defaults to "api-key"
}

// QuickAction represents a clickable button presented to the user by the agent.
// Used for both AskUserQuestion choices and present_plan approval actions.
message QuickAction {
  string id = 1;
  string label = 2;
  // If set, clicking this action triggers a mode switch to this mode name.
  string mode = 3;
  // Visual style hint: "primary", "secondary", "destructive".
  string style = 4;
}

// UserInputRequest is a unified signal that the agent needs user input.
// Type determines how the UI renders the request (banner style, notification priority).
// The message and actions are populated from Postgres by the dashboard enrichment layer.
message UserInputRequest {
  // Type classifies the request: question, approval, plan_review, turn_limit, idle, circuit_breaker, stopped.
  string type = 1;
  // Message is the human-readable prompt displayed to the user.
  string message = 2;
  // Actions are optional structured choices/buttons.
  repeated QuickAction actions = 3;
}

message TokenUsage {
