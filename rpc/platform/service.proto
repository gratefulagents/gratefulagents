message ActivityEntry {
  int64 timestamp_unix = 1;
  string type = 2;
  int32 session = 3;
  string tool = 4;
  string input = 5;
  string step = 6;
  string message = 7;
  double cost_usd = 8;
  bool cost_known = 79;
  int32 turns = 9;
  int64 input_tokens = 10;
  int64 output_tokens = 11;
  string subagent_type = 12;
  string task_id = 13;
  int64 cache_read_input_tokens = 14;
  int64 cache_creation_input_tokens = 15;
  repeated ModelUsageEntry model_usage = 16;
  double elapsed_sec = 17;
  string decision = 18;
  string reason = 19;
  string status_category = 20;

  // Subagent metrics (populated for subagent_progress, subagent_notification).
  int32  subagent_tool_count   = 21;
  int64  subagent_total_tokens = 22;
  int64  subagent_duration_ms  = 23;
  string last_tool_name        = 24;
  string subagent_status       = 25;
  string subagent_description  = 26;

  // Tool result data (populated for tool_result and tool_use entries).
  string tool_use_id = 27;   // correlates tool_use ↔ tool_result
  string output      = 28;   // tool result content (truncated)
  bool   is_error    = 29;   // tool result was an error
  string input_raw   = 30;   // full tool input JSON (truncated)

  // system.init metadata.
  string model           = 31;  // model name (e.g. "claude-sonnet-4-20250514")
  string permission_mode = 32;  // permission mode (e.g. "default", "auto-accept")
  string cwd             = 33;  // working directory
  string version         = 34;  // Agent runtime version
  int32  max_turns       = 35;  // max turns limit
  repeated string tools  = 36;  // available tool names
  repeated string mcp_servers = 37;  // connected MCP server names
  string api_key_source  = 38;  // how the API key was provided

  // result event fields.
  int64  duration_ms  = 39;  // session duration in milliseconds
  string stop_reason  = 40;  // why the session stopped
  string result_text  = 41;  // result text from "result" field
  int32  num_turns    = 42;  // number of turns

  // post_turn_summary extra fields.
  string summary_title   = 43;  // summary title
  string recent_action   = 44;  // what was just done
  bool   needs_action    = 45;  // whether user action is needed

  // api_retry extra fields.
  string error_code      = 46;  // API error code
  int64  retry_after_ms  = 47;  // retry delay milliseconds
  int32  attempt         = 48;  // current attempt number
  int32  max_retries     = 49;  // max retry count
  int32  error_status    = 50;  // HTTP status code

  // hook_response extra fields.
  string hook_id   = 51;  // hook identifier
  string hook_name = 52;  // hook display name

  // session state.
  string session_state = 53;  // session state (idle, running, requires_action)

  // Rich subagent tracking (native agent loop).
  string subagent_model         = 54;  // model used by subagent
  double subagent_cost_usd      = 55;  // subagent cost in USD
  bool   subagent_cost_known    = 80;  // whether subagent cost is known
  int32  subagent_num_turns      = 56;  // number of turns
  string subagent_isolation      = 57;  // worktree isolation mode
  string subagent_prompt         = 58;  // prompt sent (truncated)
  string subagent_result_text    = 59;  // result text (truncated)
  int64  subagent_input_tokens   = 60;  // input tokens used
  int64  subagent_output_tokens  = 61;  // output tokens used
  string subagent_stop_reason    = 62;  // why the subagent stopped

  // Precise tracking fields (from native API loop).
  int32  turn                    = 63;  // which turn in the agent loop
  int64  tool_duration_ms        = 64;  // how long the tool took to execute
  int32  tokens_before           = 65;  // estimated tokens before compaction
  int32  tokens_after            = 66;  // estimated tokens after compaction

  // Agent role tracking (which specialist agent ran this tool).
  string agent_name              = 67;  // agent role name (e.g. "executor", "explore")
  string parent_call_id          = 68;  // parent tool call ID for nested sub-agent events

  reserved 69, 70;

  // LLM attempt tracking.
  string llm_attempt_id          = 71;
  string llm_attempt_model       = 72;
  string llm_attempt_provider    = 73;
  int64  llm_attempt_input_tokens = 74;
  int64  llm_attempt_output_tokens = 75;
  int64  llm_attempt_cache_read_input_tokens = 76;
  int64  llm_attempt_cache_creation_input_tokens = 77;
  bool   llm_attempt_tokens_known = 78;
  string phase                   = 81;  // current workflow phase label

  // Live subagent DAG/progress snapshot fields from the SDK event stream.
  repeated string subagent_depends_on = 82;
  repeated string subagent_waiting_on = 83;
  string subagent_current_step = 84;
  string subagent_last_tool = 85;
  int32 subagent_files_written = 86;
  int32 subagent_messages_received = 87;
  string subagent_last_parent_message = 88;

  // Durable event id (Postgres activity_events.id, or a synthetic ordinal for
  // S3/exec-sourced logs). Monotonically increasing within a run; used as the
  // delta/pagination cursor and for lazy payload detail lookup.
  int64 event_id = 89;
  // Set when input_raw/output were truncated to payload_preview_bytes; the
  // full payloads are available via GetActivityEntryDetail.
  bool input_truncated = 90;
  bool output_truncated = 91;
}

message ChatMessage {
  string role = 1;
  string content = 2;
  int64 timestamp_unix = 3;
  // image_data_urls carries any image attachments on this message, as data URLs
  // (e.g. "data:image/png;base64,...").
  repeated string image_data_urls = 4;
  // queue_mode is the delivery mode chosen for a user message: "enqueue"
  // (deliver at the next turn boundary) or "immediate" (steer the in-flight
  // turn). Empty for assistant/system messages.
  string queue_mode = 5;
  // pending is true while a user message has been accepted but not yet
  // delivered to the agent loop. Pending messages render as queued/steering
  // rather than as part of the conversation transcript.
  bool pending = 6;
  // delivered_at_unix is when the agent loop actually consumed this user
  // message (0 while pending, or for legacy messages that predate delivery
  // tracking).
  int64 delivered_at_unix = 7;
  // id is the durable conversation message id. Pending user messages can be
  // withdrawn by passing it to CancelAgentRunMessage. 0 for surfaces that
  // don't track ids (e.g. team child transcripts).
  int64 id = 8;
  // delivery_sequence is assigned by PostgreSQL when a message becomes
  // agent-visible. It is the authoritative causal tie-breaker across messages.
  int64 delivery_sequence = 9;
  // delivery_state is pending, claimed, completed, or cancelled.
  string delivery_state = 10;
}

enum AgentRunMessageMode {
  AGENT_RUN_MESSAGE_MODE_UNSPECIFIED = 0;
  AGENT_RUN_MESSAGE_MODE_ENQUEUE = 1;
  AGENT_RUN_MESSAGE_MODE_IMMEDIATE = 2;
}

message SendAgentRunMessageRequest {
  string namespace = 1;
  string name = 2;
  string message = 3;
  AgentRunMessageMode message_mode = 4;
  // image_data_urls are optional image attachments for the message, as data URLs
  // (e.g. "data:image/png;base64,..."). Supported by vision-capable models.
  repeated string image_data_urls = 5;
}

message SendAgentRunMessageResponse {}

message CancelAgentRunMessageRequest {
  string namespace = 1;
  string name = 2;
  // message_id is the ChatMessage.id of the pending (undelivered) user
  // message to withdraw.
  int64 message_id = 3;
}

message CancelAgentRunMessageResponse {}

message CreateAgentRunRequest {
  string namespace = 1;
  string name = 2;
  string repo_url = 3;
  string base_branch = 4;
  string model = 5;
  string image = 6;
  string user_request = 7;
  string claude_api_key_secret = 8;
  string github_token_secret = 9;
  SourceRef source = 10;
  reserved 11, 12, 13, 14; // was: provider, (unused), require_approval, post_approval_mode
  string auth_mode = 15;
  string openai_oauth_secret = 16;
  repeated ProviderKeyRef provider_keys = 17;
  // reasoning_level optionally sets the model reasoning effort for this run
  // (one of: none, low, medium, high, xhigh, max). Empty uses the provider/model default.
  string reasoning_level = 18;
  // image_data_urls are optional image attachments for the initial user request,
  // as data URLs (e.g. "data:image/png;base64,..."). Supported by vision models.
  repeated string image_data_urls = 19;
  // additional_repo_urls are extra git repositories cloned into the run's
  // sandbox at startup (under repos/<name> next to the primary repository).
  // When empty, the source's default additional repositories apply.
  repeated string additional_repo_urls = 20;
  // Optional trajectory supervisor. Omit to create the run without an overseer.
  AgentRunOverseerConfig overseer = 21;
}

// MyCredentials describes the calling user's saved provider credentials and the
// personal namespace they are stored in. Presence flags are read-only and
// populated by the server from the user's per-provider secrets.
message MyCredentials {
  // namespace is the user's personal namespace (firstname-lastname-<hash>) where
  // their credential secrets and projects live.
  string namespace = 1;
  bool anthropic_api_key_present = 2;
  bool openai_api_key_present = 3;
  bool anthropic_oauth_present = 4;
  bool openai_oauth_present = 5;
  bool copilot_oauth_present = 6;
  bool github_token_present = 7;
  // integrations lists the user's free-form saved integration credentials
  // (presence only — values are never returned).
  repeated IntegrationCredentialState integrations = 8;
  bool openrouter_api_key_present = 9;
  bool xai_api_key_present = 10;
  // secrets lists every Secret in the caller's personal namespace by name and
  // key only. Secret values are never returned. Resource forms use this live
  // inventory instead of offering cluster-wide or hard-coded secret names.
  repeated UserSecretState secrets = 11;
}

// IntegrationCredentialState reports one saved integration credential: its name
// and which keys exist. Values are write-only.
message IntegrationCredentialState {
  string name = 1;
  repeated string keys = 2;
}

// IntegrationCredentialUpdate writes, partially clears, or deletes one free-form
// integration credential (stored as the usercred-<name> Secret in the user's
// namespace). Non-empty entry values are written; empty values are ignored;
// clear_keys removes individual keys; delete removes the whole credential.
// Names are DNS-safe lowercase and must not collide with the built-in
// providers (anthropic, openai, copilot, github).
message IntegrationCredentialUpdate {
  string name = 1;
  map<string, string> entries = 2;
  repeated string clear_keys = 3;
  bool delete = 4;
}

message ListMyCredentialsRequest {}

// UpdateMyCredentialsRequest sets or clears the calling user's saved provider
// credentials, stored privately in their personal namespace. Non-empty values are
// written; empty values leave the existing value unchanged. Entries listed in
// `clear` are removed. OAuth JSON fields accept the raw files written by the
// local credential files (validated and normalized server-side). Recognized
// clear keys: "anthropic-api-key", "openai-api-key",
// "openrouter-api-key", "xai-api-key", "anthropic-oauth", "openai-oauth",
// "copilot-oauth", "github-token".
message UpdateMyCredentialsRequest {
  string anthropic_api_key = 1;
  string openai_api_key = 2;
  string anthropic_oauth_json = 3;
  string openai_oauth_json = 4;
  string openai_account_id = 5;
  string copilot_oauth_json = 6;
  string github_token = 7;
  repeated string clear = 8;
  // integrations updates free-form named integration credentials (see
  // IntegrationCredentialUpdate).
  repeated IntegrationCredentialUpdate integrations = 9;
  string openrouter_api_key = 10;
  string xai_api_key = 11;
}

// ShareMyCredentialsRequest copies the calling user's saved credentials to the
// user identified by target_email. Each requested credential replaces the
// recipient's existing saved credential of the same name, and the recipient's
// copy is thereafter independent of the sender's (OAuth material refreshes
// separately in each namespace).
message ShareMyCredentialsRequest {
  // target_email identifies the recipient by exact email match.
  string target_email = 1;
  // credentials names the saved credentials to copy: "anthropic", "openai",
  // "copilot", "github", or the name of a saved integration credential.
  repeated string credentials = 2;
}

message ShareMyCredentialsResponse {
  // shared echoes the credential names that were copied to the recipient.
  repeated string shared = 1;
}

// SlackAgent describes one Slack agent configuration and status. Token fields
// are never returned; only presence flags are.
message SlackAgent {
  // configured is true when a SlackAgent CR exists.
  bool configured = 1;
  // namespace is where the SlackAgent and its tokens secret live.
  string namespace = 2;
  string name = 3;
  // Token presence (values are write-only and never returned).
  bool bot_token_present = 4;
  bool user_token_present = 5;
  bool app_token_present = 6;
  // Config echoed back for the form.
  string slack_user_id = 7;
  // Former inbox-monitoring controls (feature removed); numbers stay reserved.
  reserved 8, 9;
  reserved "monitoring_enabled", "monitoring_mode";
  bool suspended = 10;
  string model = 11;
  string provider = 12;
  // Resolved status from the controller/connector.
  string team_id = 13;
  string bot_user_id = 14;
  bool ready = 15;
  bool token_valid = 16;
  bool connected = 17;
  string last_error = 18;
  // Runtime policy applied to runs the agent creates (via a per-user
  // RuntimeProfile in the user's namespace). The dashboard only creates or
  // updates the profile when the user explicitly enables runtime policy
  // configuration.
  string permission_mode = 19; // read-only | workspace-write | danger-full-access
  string egress_mode = 20;     // unrestricted | restricted | disabled
  string runtime_profile_ref = 21;
  string mcp_policy_ref = 22;
  string mcp_policy_default_action = 23; // Allow | Deny
  repeated string mcp_policy_allowed_servers = 24;
  // Former inbox-triage controls (monitoring removed); numbers stay reserved.
  reserved 25, 26, 27, 28, 29;
  reserved "allow_users", "deny_users", "quiet_hours_start", "quiet_hours_end", "quiet_hours_tz";
  // session_idle_minutes: an incoming message reuses the conversation's run when
  // the last activity was within this window, else starts fresh (0 = default).
  int32 session_idle_minutes = 30;
  // commanders lists who may command the agent via channel @mentions besides
  // the owner. Fail-closed: empty = owner only.
  repeated string commanders = 31;
  reserved 32, 33;
  reserved "persona", "skill_package_refs";
  // mcp_server_refs / skill_refs list MCPServer and Skill names attached to
  // runs this agent creates (echoed back for the form). A skill's required
  // servers are auto-attached at run time.
  repeated string mcp_server_refs = 40;
  repeated string skill_refs = 41;
  // Shared-workspace binding: when set, this agent has no dedicated Slack app;
  // it is served by the referenced SlackWorkspace's connector.
  string workspace_ref_name = 34;
  string workspace_ref_namespace = 35;
  // image is the worker image for the connector and the runs it creates
  // (empty = operator default).
  string image = 36;
  // channel_reply_mode controls whether the agent's replies to public surfaces
  // (channels, private channels, group DMs) require the owner's approval before
  // they are posted: "require-approval" (default) or "auto".
  string channel_reply_mode = 37;
  // app_home_header / app_home_text override the static App Home tab copy (the
  // header line and the short info line under it); empty uses the connector
  // defaults. The Home tab is visible to any workspace member who opens the
  // app and never shows live agent state.
  string app_home_header = 38;
  string app_home_text = 39;
  // github_token_present is true when this agent has its own GitHub token (a
  // per-agent Secret) overriding the owner's saved GitHub token for the runs
  // it creates. Token values are write-only and never returned.
  bool github_token_present = 42;
  // reasoning_level is the default model reasoning effort for runs this agent
  // creates (none|low|medium|high|xhigh|max; empty = provider/model default).
  string reasoning_level = 43;
  // additional_repo_urls are extra git repositories cloned into each run's
  // sandbox at startup.
  repeated string additional_repo_urls = 44;
}

// MCPServerInfo describes one cluster-managed MCP server config. The full
// config is echoed so the settings form can edit servers in place (secret env
// references carry no secret values).
message MCPServerInfo {
  string name = 1;
  string version = 2;
  string description = 3;
  string command = 4;
  repeated string args = 5;
  map<string, string> env = 6;
  repeated string allow_env = 7;
  repeated MCPServerSecretEnv secret_env = 8;
  bool trust_read_only_hint = 9;
  // allow_network opts this cluster-managed server into the run pod's network
  // namespace; the RuntimeProfile egress policy remains in force.
  bool allow_network = 10;
}

// MCPServerSecretEnv is one environment variable a server sources from a
// Secret key (e.g. an integration credential) in the run's namespace.
message MCPServerSecretEnv {
  string name = 1;
  string secret_name = 2;
  string secret_key = 3;
  // required inverts the default (a missing Secret never blocks the run pod
  // unless required is true).
  bool required = 4;
}

message ListMCPServersRequest {}

message ListMCPServersResponse {
  string namespace = 1;
  repeated MCPServerInfo servers = 2;
}

// UpsertMCPServerRequest creates or updates one MCP server config in the
// caller's namespace. The whole spec is assigned on every save (the form owns
// it). Name must be DNS-safe lowercase.
message UpsertMCPServerRequest {
  string name = 1;
  string version = 2;
  string description = 3;
  string command = 4;
  repeated string args = 5;
  map<string, string> env = 6;
  repeated string allow_env = 7;
  repeated MCPServerSecretEnv secret_env = 8;
  bool trust_read_only_hint = 9;
  // allow_network is honored only for this cluster-managed MCPServer resource;
  // repository .mcp.json configuration cannot request network access.
  bool allow_network = 10;
}

message DeleteMCPServerRequest {
  string name = 1;
}

// SkillInfo describes one skill: reusable agent instructions, either inline or
