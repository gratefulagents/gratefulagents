  ResourceOwner resource_owner = 45;
  string my_permission = 46; // populated per-request: "owner", "collaborator", "viewer", "admin"
  // Spec-level trigger settings that are safe to edit after onboarding.
  GitHubRepositoryTriggerSettings trigger_settings = 48;
  // Optional reviewer-specific defaults. Empty means reviewers inherit
  // defaults (fields 41-47) from the repository trigger.
  AgentRunDefaults reviewer_defaults = 49;
  // Resolved policy view for reviewer_defaults.
  string reviewer_permission_mode = 50;
  string reviewer_egress_mode = 51;
  string reviewer_mcp_policy_default_action = 52;
