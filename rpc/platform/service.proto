// --- Agent run overseer ---

// AgentRunOverseerConfig mirrors AgentRun spec.overseer. Scalar presence is
// retained for cadence/cap so an omitted default differs from the valid cap 0.
message AgentRunOverseerConfig {
  string mode_ref_name = 1;    // Empty uses the default "overseer" ModeTemplate.
  string mode_ref_version = 2;
  string mode_ref_channel = 3;
  string model = 4;            // Empty uses the platform default, then the supervised run's model.
  string authority = 5;        // observe | advise | enforce; empty defaults to advise.
  optional int32 interval_minutes = 6;   // Absent defaults to 10; otherwise 1..1440.
  optional int32 max_interventions = 7;  // Absent defaults to 5; otherwise 0..100.
}

message AgentRunOverseerSummary {
  string run_name = 1;
  string state = 2;
  int64 checkpoints_handled = 3;
  int32 interventions_used = 4;
  int32 completion_rejections_used = 5;
  string last_verdict = 6;
  string last_summary = 7;
  int64 last_verdict_at_unix = 8;
}

message AttachAgentRunOverseerRequest {
  string namespace = 1;
  string name = 2;
  AgentRunOverseerConfig overseer = 3;
}

message UpdateAgentRunOverseerRequest {
  string namespace = 1;
  string name = 2;
  optional string authority = 3;
  optional int32 interval_minutes = 4;
  optional int32 max_interventions = 5;
}

message DetachAgentRunOverseerRequest {
  string namespace = 1;
  string name = 2;
}

// --- skills.sh catalog ---

// SkillCatalogEntry is one installable entry returned by skills.sh.
message SkillCatalogEntry {
  string source = 1;
  string skill_id = 2;
  string name = 3;
  int64 installs = 4;
  bool is_official = 5;
  string catalog_url = 6;
}

// ListSkillCatalogRequest browses the all-time catalog when query is empty.
// The skills.sh catalog uses zero-based pages of 200 entries. Search results
// are capped by skills.sh and ignore page.
message ListSkillCatalogRequest {
  string query = 1;
  int32 page = 2;
}

message ListSkillCatalogResponse {
  repeated SkillCatalogEntry skills = 1;
  int64 total = 2;
  bool has_more = 3;
  int32 page = 4;
}

message InstallSkillFromCatalogRequest {
  string source = 1;
  string skill_id = 2;
}

// UserSecretState reports a Secret owned by the calling user's namespace.
// Only metadata needed by reference pickers is exposed; values remain private.
message UserSecretState {
  string name = 1;
  repeated string keys = 2;
}

// ProjectContent is a durable file, folder, or editable professional artifact.
// File bytes and office formats are preserved exactly in immutable versions;
// previews/editors may interpret supported textual media types without rewriting
// the original upload.
message ProjectContent {
  string id = 1;
  string project_namespace = 2;
  string project_name = 3;
  string kind = 4; // file | folder | document | workbook | presentation | html
  string path = 5;
  string media_type = 6;
  int32 current_version = 7;
  int64 size_bytes = 8;
  string content_hash = 9;
  // pending | clean | rejected. "clean" currently reflects the built-in
  // synchronous policy scan (extension allow-list + EICAR signature);
  // deployments adding asynchronous scanners should write "pending" first.
  string scan_status = 10;
  string metadata_json = 11;
  string provenance_json = 12;
  string created_by = 13;
  int64 created_at_unix = 14;
  int64 updated_at_unix = 15;
  int64 deleted_at_unix = 16;
}

message ProjectContentVersion {
  int32 version = 1;
  int64 size_bytes = 2;
  string content_hash = 3;
  string created_by = 4;
  int64 created_at_unix = 5;
  string metadata_json = 6;
}

message ListProjectContentRequest {
  string namespace = 1;
  string project_name = 2;
  bool include_deleted = 3;
  // Optional cap on returned items; zero returns everything. Reserved so
  // token-based pagination can be added without an API break.
  int32 page_size = 4;
  string page_token = 5;
}
message ListProjectContentResponse {
  repeated ProjectContent items = 1;
  // Empty until token-based pagination is implemented.
  string next_page_token = 2;
}

message GetProjectContentRequest {
  string namespace = 1;
  string project_name = 2;
  string id = 3;
  int32 version = 4; // zero selects the current version
}
message GetProjectContentResponse {
  ProjectContent item = 1;
  bytes content = 2;
  int32 version = 3;
}

message CreateProjectContentRequest {
  string namespace = 1;
  string project_name = 2;
  string kind = 3;
  string path = 4;
  string media_type = 5;
  bytes content = 6;
  string metadata_json = 7;
  string provenance_json = 8;
}

message UpdateProjectContentRequest {
  string namespace = 1;
  string project_name = 2;
  string id = 3;
  string path = 4;
  string media_type = 5;
  optional bytes content = 6;
  string metadata_json = 7;
  string provenance_json = 8;
  int32 expected_version = 9;
  // Required when replacing bytes. Renames and metadata-only edits are safe.
  bool confirm_overwrite = 10;
}

message DuplicateProjectContentRequest {
  string namespace = 1;
  string project_name = 2;
  string id = 3;
  string destination_path = 4;
}

message ListProjectContentVersionsRequest {
  string namespace = 1;
  string project_name = 2;
  string id = 3;
  // Optional cap on returned versions; zero returns everything. Reserved so
  // token-based pagination can be added without an API break.
  int32 page_size = 4;
  string page_token = 5;
}
message ListProjectContentVersionsResponse {
  repeated ProjectContentVersion versions = 1;
  // Empty until token-based pagination is implemented.
  string next_page_token = 2;
}

message RestoreProjectContentVersionRequest {
  string namespace = 1;
  string project_name = 2;
  string id = 3;
  int32 version = 4;
  int32 expected_version = 5;
}

message DeleteProjectContentRequest {
  string namespace = 1;
  string project_name = 2;
  string id = 3;
  // Callers must explicitly acknowledge permanent removal: deletion hides the
  // item and purges its stored version bytes so project quota is recovered.
  bool confirm = 4;
}

// Browser-safe provider OAuth messages live at the end of this file so adding
// the feature does not renumber existing generated message metadata.
message StartProviderOAuthRequest {
  // Supported values: "anthropic", "openai".
  string provider = 1;
}

message ProviderOAuthStart {
  string provider = 1;
  // "manual-code" for Anthropic, "device" for OpenAI.
  string mode = 2;
  string authorize_url = 3;
  string user_code = 4;
  uint32 interval_seconds = 5;
  // Opaque per-attempt identifier required by Complete/Poll.
  string session_id = 6;
}

message CompleteProviderOAuthRequest {
  string provider = 1;
  // Anthropic's callback page displays code#state for the user to paste.
  string code = 2;
  string session_id = 3;
}

message PollProviderOAuthRequest {
  string provider = 1;
  string session_id = 2;
}

message ProviderOAuthResult {
  // pending | completed | expired | error
  string status = 1;
  string provider = 2;
  string email = 3;
  string error = 4;
  // Populated after completion so the UI can update credential presence
  // without receiving any provider token material.
  MyCredentials credentials = 5;
}

// OpenAI OAuth usage messages live at the end of this file so adding this
// settings surface does not renumber existing generated message metadata.
message GetMyOpenAIUsageRequest {}

// MyOpenAIUsage contains only account-level data exposed by the user's
// current ChatGPT OAuth credential.
message MyOpenAIUsage {
  bool openai_oauth_present = 1;
  string account_email = 2;
  string plan_type = 3;
  bool account_status_available = 4;
  repeated OpenAIUsageLimit limits = 5;
  string credits = 6;
  bool token_activity_available = 7;
  optional int64 lifetime_tokens = 8;
  optional int64 peak_daily_tokens = 9;
  optional int64 current_streak_days = 10;
  optional int64 longest_streak_days = 11;
  optional int64 longest_running_turn_seconds = 12;
  int64 last_30_days_tokens = 13;
  int32 lookback_days = 14;
  int64 fetched_at_unix = 15;
  repeated string warnings = 16;
}

message OpenAIUsageLimit {
  string label = 1;
  double used_percent = 2;
  int64 reset_at_unix = 3;
  string details = 4;
}
