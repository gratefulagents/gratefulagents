// ---- Filesystem access messages ----

message GetDiffRequest {
  string namespace = 1;
  string name = 2;
  string resource_type = 3; // "AgentRun"
  // repo_path selects which workspace repository to diff, using the path
  // reported by ListRepositories (e.g. "/workspace/repo/repos/widgets").
  // Empty means the run's primary repository.
  string repo_path = 4;
}

message GetDiffResponse {
  string diff = 1;
  bool is_complete = 2;  // true if task is terminal (diff is final)
  bool truncated = 3;
  string source = 4;     // "pod", "s3", or "unavailable"
  // Paths of untracked files. Content is intentionally omitted and fetched
  // with ReadFile only when the user selects a path.
  repeated string new_files = 5;
  bool new_files_truncated = 6;
}

message ListFilesRequest {
  string namespace = 1;
  string name = 2;
  string path = 3;           // relative to /workspace/repo, empty = root
  string resource_type = 4;  // "AgentRun"
}

message ListFilesResponse {
  repeated FileEntry files = 1;
}

message FileEntry {
  string name = 1;
  bool is_dir = 2;
  int64 size_bytes = 3;
}

// ListWorkspaceFiles returns a flat, recursive list of file paths in the
// workspace for fuzzy-finding (e.g. the chat composer "@" file picker).
// Uses a filesystem walk (not git) so it works regardless of how many repos
// are present, and prunes heavy directories (.git, node_modules, …).
message ListWorkspaceFilesRequest {
  string namespace = 1;
  string name = 2;
  string resource_type = 3;  // "AgentRun"
  int32 limit = 4;           // 0 = default cap
}

message ListWorkspaceFilesResponse {
  // file paths for the "@" picker: repo-relative for the primary repo
  // (e.g. "src/main.go") and absolute for additional cloned repos
  // (e.g. "/workspace/widgets/src/index.ts").
  repeated string paths = 1;
  bool truncated = 2;         // true when more files exist than the limit
}

// RepositoryInfo describes a git repository cloned into the run's sandbox.
message RepositoryInfo {
  string name = 1;        // directory name under /workspace
  string path = 2;        // absolute path in the sandbox (e.g. /workspace/repo)
  string remote_url = 3;  // origin remote URL, when available
  string branch = 4;      // current checked-out branch, when available
  bool is_primary = 5;    // true for the run's original repository (/workspace/repo)
}

// CloneRepository clones an additional git repository into a RUNNING run's
// sandbox using the pod's existing git credentials. Not available for terminal
// runs (the sandbox is gone).
message CloneRepositoryRequest {
  string namespace = 1;
  string name = 2;
  string resource_type = 3;  // "AgentRun"
  string repo_url = 4;       // https or git@ URL to clone
  string base_branch = 5;    // optional branch to clone (empty = remote default)
}

message CloneRepositoryResponse {
  RepositoryInfo repository = 1;
}

// ListRepositories lists the git repositories present in a running run's
// sandbox (the original repo plus any cloned at runtime).
message ListRepositoriesRequest {
  string namespace = 1;
  string name = 2;
  string resource_type = 3;  // "AgentRun"
}

message ListRepositoriesResponse {
  repeated RepositoryInfo repositories = 1;
}

message ReadFileRequest {
  string namespace = 1;
  string name = 2;
  string path = 3;           // relative to the selected repository
  string resource_type = 4;  // "AgentRun"
  int32 max_lines = 5;       // 0 = default (1000)
  // Selects the repository using the same values as GetDiffRequest.repo_path.
  // Empty means the run's primary repository.
  string repo_path = 6;
}

message ReadFileResponse {
  string content = 1;
  bool truncated = 2;
}

