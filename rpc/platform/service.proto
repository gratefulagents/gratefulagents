// UpdateSlackAgentRequest creates or updates a Slack agent.
// Non-empty token values are written to the user's tokens secret; empty values
// leave the existing value unchanged. The SlackAgent CR is created on first use
// and updated thereafter. Recognized clear keys: "bot-token", "user-token",
// "app-token".
message UpdateSlackAgentRequest {
  string bot_token = 1;
  // user_token (xoxp-) is optional; it only powers the agent's slack_search
  // read tool (Slack permits search.messages with user tokens only).
  string user_token = 2;
  string app_token = 3;
  string slack_user_id = 4;
  // Former inbox-monitoring controls (feature removed); numbers stay reserved.
  reserved 5, 6;
  reserved "monitoring_enabled", "monitoring_mode";
  bool suspend = 7;
  // Defaults for runs the connector creates. When use_saved_credentials is true,
  // the user's saved provider credentials are referenced instead of inline keys.
  string model = 8;
  string provider = 9;
  string auth_mode = 10;
  bool use_saved_credentials = 11;
  string anthropic_api_key = 12;
  string openai_api_key = 13;
  repeated string clear = 14;
  // Runtime policy for runs the agent creates. The dashboard provisions a
  // RuntimeProfile only when configure_runtime_profile is true. If false and
  // runtime_profile_ref is non-empty, the SlackAgent references that existing
  // profile without creating or updating it.
  string permission_mode = 15; // read-only | workspace-write | danger-full-access
  string egress_mode = 16;     // unrestricted | restricted | disabled
  string runtime_profile_ref = 17;
  bool configure_runtime_profile = 18;
  // MCP policy for runs the agent creates. The dashboard provisions an MCPPolicy
  // only when configure_mcp_policy is true. If false and mcp_policy_ref is
  // non-empty, the SlackAgent references that existing policy.
  string mcp_policy_ref = 19;
  bool configure_mcp_policy = 20;
  string mcp_policy_default_action = 21; // Allow | Deny
  repeated string mcp_policy_allowed_servers = 22;
  // Kubernetes-safe SlackAgent name.
  string name = 23;
  // Former inbox-triage controls (monitoring removed); numbers stay reserved.
  reserved 24, 25, 26, 27, 28;
  reserved "allow_users", "deny_users", "quiet_hours_start", "quiet_hours_end", "quiet_hours_tz";
  // session_idle_minutes bounds conversation continuity: a follow-up reuses the
  // conversation's AgentRun within this idle window, else a fresh run starts.
  // 0 leaves the existing value unchanged (defaulting to 12h on first use).
  int32 session_idle_minutes = 29;
  // commanders lists who may command the agent via channel @mentions besides
  // the owner. Fail-closed: empty = owner only.
  repeated string commanders = 30;
  reserved 31, 32;
  reserved "persona", "skill_package_refs";
  // mcp_server_refs / skill_refs list MCPServer and Skill names to attach to
  // runs this agent creates (assigned as a whole on every save).
  repeated string mcp_server_refs = 39;
  repeated string skill_refs = 40;
  // Shared-workspace binding: when workspace_name is set the agent joins that
  // SlackWorkspace instead of using its own tokens (bot/user/app token fields
  // are ignored, slack_user_id becomes required).
  string workspace_name = 33;
  string workspace_namespace = 34;
  // image is the worker image for the connector and the runs this agent
  // creates. Assigned as a whole on every save; empty = operator default.
  string image = 35;
  // channel_reply_mode controls whether the agent's replies to public surfaces
  // (channels, private channels, group DMs) are held for the owner's approval:
  // "require-approval" (default) or "auto" (post directly). Empty keeps
  // require-approval.
  string channel_reply_mode = 36;
  // App Home tab copy overrides (empty = connector defaults): header renders
  // as Slack plain text (max 150 chars), text as one short mrkdwn line (max
  // 1000 chars).
  string app_home_header = 37;
  string app_home_text = 38;
  // github_token optionally gives this agent its own GitHub token for the runs
  // it creates, instead of the owner's saved GitHub token. Write-only: empty
  // keeps the current value; clear with clear: ["github-token"] to fall back
  // to the saved token.
  string github_token = 41;
  // reasoning_level sets the default model reasoning effort for runs this
  // agent creates (one of: none, low, medium, high, xhigh, max). Assigned as a
  // whole on every save; empty = provider/model default.
  string reasoning_level = 42;
  // additional_repo_urls are extra git repositories cloned into each run's
  // sandbox at startup (assigned as a whole on every save).
  repeated string additional_repo_urls = 43;
}

