---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authservice
  namespace: operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authservice
  template:
    metadata:
      labels:
        app: authservice
    spec:
      containers:
        - name: authservice
          image: authservice:latest
          ports:
            - containerPort: 9090
          env:
            - name: AUTH_DB_URL
              value: postgres://sample-user:sample-password@sample-postgres.sample-postgres.svc:5432/sample-auth?sslmode=disable
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: authservice-config
                  key: google-client-id
            - name: AUTH_LISTEN_ADDR
              value: ":9090"
            - name: AUTH_ALLOWED_ORIGINS
              value: "*"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: authservice
  namespace: operator-system
spec:
  selector:
    app: authservice
  ports:
    - port: 9090
      targetPort: 9090
