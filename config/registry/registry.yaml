apiVersion: v1
kind: Namespace
metadata:
  name: gratefulagents-registry
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: gratefulagents-registry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: gratefulagents-registry
spec:
  replicas: 1
  # The registry uses a single-node PVC and a fixed host port. Recreate avoids
  # a rollout deadlock while the previous pod still owns either resource.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gratefulagents-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gratefulagents-registry
    spec:
      containers:
        - name: registry
          image: registry:2
          imagePullPolicy: IfNotPresent
          ports:
            - name: registry
              containerPort: 5000
              hostPort: 5000
              hostIP: 127.0.0.1
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: gratefulagents-registry
spec:
  selector:
    app.kubernetes.io/name: gratefulagents-registry
  ports:
    - name: registry
      port: 5000
      targetPort: registry
      protocol: TCP
