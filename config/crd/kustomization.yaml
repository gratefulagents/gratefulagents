- bases/platform.gratefulagents.dev_modetemplates.yaml
- bases/platform.gratefulagents.dev_roleinstructions.yaml
- bases/platform.gratefulagents.dev_runtimeprofiles.yaml
- bases/platform.gratefulagents.dev_mcpservers.yaml
- bases/platform.gratefulagents.dev_skills.yaml

- bases/triggers.gratefulagents.dev_githubrepositories.yaml
- bases/triggers.gratefulagents.dev_maintainerworkitems.yaml
