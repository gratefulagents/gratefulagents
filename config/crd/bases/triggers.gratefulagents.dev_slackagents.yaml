---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: slackagents.triggers.gratefulagents.dev
spec:
  group: triggers.gratefulagents.dev
  names:
    kind: SlackAgent
    listKind: SlackAgentList
    plural: slackagents
    singular: slackagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.teamId
      name: Team
      type: string
    - jsonPath: .spec.suspend
      name: Suspended
      type: boolean
    - jsonPath: .status.eventsProcessed
      name: Events
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SlackAgent is the Schema for the slackagents API. Each SlackAgent provisions a
          named Slack connector that opens an outbound Socket Mode WebSocket and runs
          the agent loop in-process, spawning child AgentRuns for heavy tasks.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SlackAgentSpec defines the desired state of SlackAgent.
            properties:
              appHome:
                description: |-
                  appHome customizes the static App Home tab copy (header and info line).
                  When nil, the connector renders its built-in defaults.
                properties:
                  header:
                    description: |-
                      header overrides the App Home header line. Defaults to the agent name.
                      Rendered as Slack plain text; Slack caps header blocks at 150 characters.
                    maxLength: 150
                    type: string
                  text:
                    description: |-
                      text overrides the short info line under the header. Rendered as Slack
                      mrkdwn. Defaults to a generic note pointing at the owner's dashboard.
                    maxLength: 1000
                    type: string
                type: object
              channelReplyMode:
                default: require-approval
                description: |-
                  channelReplyMode controls whether the agent's replies to public surfaces
                  (channels, private channels, group DMs) require the owner's approval
                  before they are posted. Defaults to require-approval; set to auto to let
                  the agent post directly. 1:1 DM and assistant-pane replies are always
                  direct.
                enum:
                - require-approval
                - auto
                type: string
              commanders:
                description: |-
                  commanders lists who may command the agent via channel @mentions besides
                  the owner (always allowed). Fail-closed: when empty, only the owner can
                  command it. Non-commanders are silently ignored (logged, never answered).
                items:
                  type: string
                type: array
                x-kubernetes-list-type: set
              defaults:
                description: |-
                  defaults holds the fields used when creating child AgentRuns for heavy
                  tasks (model, provider, credentials, mode, optional repository).
                properties:
                  additionalRepos:
                    description: |-
                      additionalRepos lists extra git repository URLs cloned into each run's
                      sandbox at startup, under repos/<name> next to the primary repository.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  allowedModels:
                    description: |-
                      allowedModels optionally constrains which provider models may be surfaced
                      for runs created from this source.
                      When empty, all provider-returned models remain eligible for selection.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  authMode:
                    allOf:
                    - enum:
                      - api-key
                      - oauth
                    - enum:
                      - api-key
                      - oauth
                    default: api-key
                    description: |-
                      authMode controls provider credential mode:
                      - "api-key" (default): use defaults.secrets.claudeApiKey or providerKeys
                      - "oauth": supported for provider "openai", "anthropic", and "copilot"; requires
                        defaults.secrets.openaiOAuthSecret
                    type: string
                  baseBranch:
                    default: main
                    description: baseBranch is the branch to fork from.
                    type: string
                  customInstructions:
                    description: |-
                      customInstructions is operator-managed instructions injected into every
                      task's CLAUDE.md for this repo. Prepended before the repo's own CLAUDE.md
                      content so repo-specific rules can override platform defaults.
                    type: string
                  disableCommandSandbox:
                    description: |-
                      disableCommandSandbox completely disables the bubblewrap (bwrap)
                      subprocess sandbox for runs created from this trigger: model-controlled
                      commands and MCP stdio servers execute directly in the worker container
                      instead of inside the enforcing bwrap boundary. The pod/container
                      isolation still applies, but workspace write containment and read-only
                      permission mode become advisory only. Admin-only escape hatch for
                      toolchains that are incompatible with bubblewrap; it is intentionally
                      not exposed through the dashboard API, so it can only be set directly
                      on the trigger resource (kubectl/GitOps).
                    type: boolean
                  executionMode:
                    description: |-
                      executionMode controls the orchestration model for created AgentRuns.
                      When omitted but team is configured, team mode is implied.
                    enum:
                    - linear
                    - team
                    type: string
                  image:
                    description: |-
                      image is the worker pod image.
                      When omitted, the controller uses its built-in default image.
                    type: string
                  kubernetesAdmin:
                    description: |-
                      kubernetesAdmin grants runs created from this trigger cluster-admin
                      RBAC plus read-only platform introspection tools. Admin-only: it is
                      intentionally not exposed through the dashboard trigger APIs, so it can
                      only be set directly on the trigger resource (kubectl/GitOps). Projects
                      additionally expose the admin-gated spec.kubernetesAdmin field for
                      dashboard-created runs.
                    type: boolean
                  mcpPolicyRef:
                    description: |-
                      mcpPolicyRef references an MCPPolicy in the same namespace.
                      The policy controls which MCP servers are allowed or denied.
                      When omitted, the agent defaults to deny-all for MCP tools (zero trust).
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  mcpServerRefs:
                    description: |-
                      mcpServerRefs lists MCPServer resources in the same namespace to inject
                      into created AgentRuns.
                    items:
                      description: NamedRef references another namespaced resource
                        by name.
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  modeRef:
                    description: |-
                      modeRef selects a ModeTemplate for created AgentRuns.
                      When set, the controller pins the resolved template snapshot on the run's status.
                      When omitted, the mode is inferred from workflowMode + executionMode via the compat adapter.
                    properties:
                      channel:
                        type: string
                      name:
                        type: string
                      version:
                        type: string
                    required:
                    - name
                    type: object
                  model:
                    description: |-
                      model is the model identifier for the selected provider.
                      May include a provider prefix (e.g. "anthropic/claude-sonnet-4-6"),
                      in which case the separate provider field is ignored.
                    type: string
                  openaiApi:
                    default: responses
                    description: |-
                      openaiApi selects which OpenAI endpoint family to use when provider is
                      OpenAI-compatible:
                      - "responses": force /v1/responses (default)
                      - "chat-completions": force /v1/chat/completions
                      Copilot selects the supported endpoint per model in the SDK
                      (/v1/messages, /responses, or /chat/completions).
                    enum:
                    - responses
                    - chat-completions
                    type: string
                  openaiBaseURL:
                    description: |-
                      openaiBaseURL overrides the OpenAI-compatible API base URL used for
                      created tasks.
                      If omitted for an OpenAI-compatible provider, a provider-specific default
                      URL is applied automatically.
                    type: string
                  provider:
                    default: openai
                    description: |-
                      Deprecated: use a prefixed model value (e.g. "anthropic/claude-sonnet-4-6") instead.
                      provider selects which LLM runtime provider to use.
                      Supported values:
                      - "anthropic" (Anthropic Messages API)
                      - "openai" (OpenAI-compatible API with OpenAI default URL)
                      - "gemini" (OpenAI-compatible API with Gemini default URL)
                      - "openrouter" (OpenAI-compatible API with OpenRouter default URL)
                      - "groq" (OpenAI-compatible API with Groq default URL)
                      - "xai" (OpenAI-compatible API with xAI default URL)
                      - "copilot" (GitHub OAuth provider)

                      When omitted, "openai" is used.
                    enum:
                    - anthropic
                    - openai
                    - gemini
                    - openrouter
                    - groq
                    - xai
                    - copilot
                    type: string
                  reasoningLevel:
                    allOf:
                    - enum:
                      - none
                      - low
                      - medium
                      - high
                      - xhigh
                      - max
                    - enum:
                      - none
                      - low
                      - medium
                      - high
                      - xhigh
                      - max
                    description: |-
                      reasoningLevel optionally sets the default model reasoning effort for
                      runs created from this source (one of: none, low, medium, high, xhigh, max).
                      Empty uses the provider/model default. Individual runs may override it.
                    type: string
                  repoURL:
                    description: |-
                      repoURL is the git repository URL to clone. Optional: when empty, runs start
                      without a repository (repoless) and repos can be cloned at runtime.
                    type: string
                  runtimeProfileRef:
                    description: |-
                      runtimeProfileRef references a RuntimeProfile in the same namespace.
                      The profile controls permission mode, allowed tools, and other runtime policies.
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  secrets:
                    description: secrets references K8s Secrets for credentials.
                    properties:
                      claudeApiKey:
                        description: |-
                          Deprecated: use providerKeys instead for explicit per-provider credential mapping.
                          The field name is kept for backward compatibility.
                        type: string
                      githubToken:
                        description: |-
                          githubToken is the name of the K8s Secret containing the GitHub token.
                          It is optional for GitHubRepository triggers that use GitHub App auth.
                        type: string
                      openaiOAuthSecret:
                        description: |-
                          openaiOAuthSecret is the name of the K8s Secret containing provider OAuth
                          material for authMode=oauth. The field name is kept for backward
                          compatibility; it is used by providers that support OAuth.
                        type: string
                      providerKeys:
                        description: |-
                          providerKeys is a list of per-provider API key secret references.
                          Each entry is propagated to the AgentRun and mounted as the correct
                          env var for the specified provider (e.g. ANTHROPIC_API_KEY, OPENAI_API_KEY).
                        items:
                          description: ProviderKeyRef references a K8s Secret holding
                            an API key for a specific provider.
                          properties:
                            provider:
                              description: provider is the provider name (e.g. "anthropic",
                                "openai", "openrouter", "gemini", "groq", "xai", "copilot").
                              type: string
                            secretKey:
                              description: 'secretKey is the key within the K8s Secret
                                (default: "api-key").'
                              type: string
                            secretName:
                              description: secretName is the name of the K8s Secret.
                              type: string
                          required:
                          - provider
                          - secretName
                          type: object
                        type: array
                    type: object
                  skillRefs:
                    description: |-
                      skillRefs lists Skill resources in the same namespace to inject into
                      created AgentRuns (their required MCP servers are auto-attached).
                    items:
                      description: NamedRef references another namespaced resource
                        by name.
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  team:
                    description: |-
                      team configures the predeclared team-mode orchestration contract for
                      created AgentRuns.
                    properties:
                      completionPolicy:
                        description: AgentRunCompletionPolicy defines the gates required
                          before success.
                        properties:
                          requireApproval:
                            type: boolean
                        type: object
                      delegationPolicy:
                        description: AgentRunDelegationPolicy defines the parent's
                          child-run limits.
                        properties:
                          maxChildren:
                            format: int32
                            type: integer
                          maxDepth:
                            format: int32
                            type: integer
                          parentOnly:
                            type: boolean
                        type: object
                      steps:
                        items:
                          description: AgentRunTeamStep defines one orchestration
                            step in team mode.
                          properties:
                            name:
                              type: string
                            tasks:
                              items:
                                description: AgentRunTeamTask defines one predeclared
                                  worker assignment inside a TeamStep.
                                properties:
                                  artifactContract:
                                    type: string
                                  dependsOn:
                                    items:
                                      type: string
                                    type: array
                                    x-kubernetes-list-type: atomic
                                  maxRetries:
                                    format: int32
                                    type: integer
                                  name:
                                    type: string
                                  objective:
                                    type: string
                                  role:
                                    type: string
                                  runtimeProfileRef:
                                    description: NamedRef references another namespaced
                                      resource by name.
                                    properties:
                                      name:
                                        type: string
                                    required:
                                    - name
                                    type: object
                                required:
                                - name
                                type: object
                              type: array
                              x-kubernetes-list-type: atomic
                            type:
                              description: AgentRunTeamStepType is the bounded phase-1
                                team step contract.
                              enum:
                              - serial
                              - parallel
                              - approval_gate
                              type: string
                          required:
                          - name
                          - type
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                    type: object
                  timeout:
                    default: 2h
                    description: timeout is the maximum duration for created AgentRuns.
                    type: string
                  workflowMode:
                    allOf:
                    - enum:
                      - chat
                      - auto
                    - enum:
                      - auto
                      - chat
                    description: |-
                      workflowMode is retained for compatibility. Created runs always use auto;
                      legacy chat values are normalized to finish-gated autonomous pacing.
                    type: string
                required:
                - secrets
                type: object
              image:
                description: |-
                  image overrides the connector pod image. When omitted, the controller uses
                  its built-in default worker image.
                type: string
              sessionIdleMinutes:
                description: |-
                  sessionIdleMinutes controls conversation continuity: an incoming message
                  reuses the conversation's existing AgentRun when the last activity was
                  within this window, otherwise a fresh run starts. Keeps a long-lived
                  conversation's context (and cost) from growing without bound. Defaults to
                  720 (12h) when unset or non-positive.
                format: int32
                type: integer
              slackUserId:
                description: |-
                  slackUserId is the owner's Slack user ID (e.g. "U0123ABC"). Used to
                  distinguish the owner's own messages from messages other people send them
                  and to avoid self-reply loops. When empty, the connector resolves it from
                  the user token via auth.test.
                type: string
              suspend:
                description: |-
                  suspend pauses the connector (scales the Deployment to zero) while keeping
                  status readable.
                type: boolean
              tokensSecret:
                description: |-
                  tokensSecret is the name of a K8s Secret in the same namespace holding the
                  Slack tokens for a dedicated per-user Slack app. Expected keys: bot-token
                  (xoxb-), user-token (xoxp-), and app-token (xapp-, required for Socket
                  Mode). Exactly one of tokensSecret or workspaceRef must be set.
                type: string
              workspaceRef:
                description: |-
                  workspaceRef binds this agent to a shared SlackWorkspace app instead of a
                  dedicated one. The workspace's single connector serves this agent, routing
                  the owner's messages here; slackUserId is required so the connector can
                  map Slack users to member agents. Exactly one of tokensSecret or
                  workspaceRef must be set.
                properties:
                  name:
                    description: name of the SlackWorkspace.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      namespace of the SlackWorkspace. Defaults to the SlackAgent's namespace
                      when empty.
                    type: string
                required:
                - name
                type: object
            required:
            - defaults
            type: object
          status:
            description: SlackAgentStatus defines the observed state of SlackAgent.
            properties:
              botUserId:
                description: botUserId is the resolved Slack user ID of the bot (from
                  auth.test).
                type: string
              conditions:
                description: conditions represent the current state of the SlackAgent.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              deploymentName:
                description: deploymentName is the connector Deployment managed by
                  this SlackAgent.
                type: string
              eventsProcessed:
                description: eventsProcessed is the cumulative number of Slack events
                  handled.
                format: int32
                type: integer
              lastError:
                description: lastError contains the message from the most recent failed
                  operation.
                type: string
              lastEventTime:
                description: lastEventTime is when the connector last processed a
                  Slack event.
                format: date-time
                type: string
              teamId:
                description: teamId is the resolved Slack workspace/team ID (from
                  auth.test).
                type: string
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: exactly one of spec.tokensSecret or spec.workspaceRef must be set
          rule: (has(self.spec.tokensSecret) && self.spec.tokensSecret != '') != has(self.spec.workspaceRef)
        - message: spec.slackUserId is required when spec.workspaceRef is set
          rule: '!has(self.spec.workspaceRef) || (has(self.spec.slackUserId) && self.spec.slackUserId
            != '''')'
    served: true
    storage: true
    subresources:
      status: {}
