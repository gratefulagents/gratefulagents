---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: mcpservers.platform.gratefulagents.dev
spec:
  group: platform.gratefulagents.dev
  names:
    kind: MCPServer
    listKind: MCPServerList
    plural: mcpservers
    singular: mcpserver
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: MCPServer is the Schema for cluster-managed MCP server configs.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MCPServerSpec defines the desired state of MCPServer.
              An MCPServer is a named, cluster-managed MCP server config that can be
              attached to AgentRuns through spec.mcpServerRefs, or pulled in automatically
              by a Skill that requires it.
            properties:
              description:
                description: |-
                  description is a short human-readable summary shown when browsing
                  servers (e.g. in the dashboard selector).
                type: string
              mcpServerConfig:
                description: MCPServerConfig defines how to run the MCP server.
                properties:
                  allowEnv:
                    description: |-
                      AllowEnv is the explicit opt-in list of environment variable names that
                      may pass through to the MCP server subprocess even though they match the
                      SDK credential denylist (e.g. names containing TOKEN/SECRET/PASSWORD).
                      Only list names the server genuinely needs; everything else is filtered.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  allowNetwork:
                    description: |-
                      AllowNetwork opts this cluster-managed server into the run pod's network
                      namespace. The RuntimeProfile's egress policy remains the outer boundary.
                      Repository .mcp.json files cannot request this capability.
                    type: boolean
                  args:
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  command:
                    type: string
                  env:
                    additionalProperties:
                      type: string
                    type: object
                  secretEnv:
                    description: |-
                      SecretEnv lists environment variables sourced from Secrets that runs
                      referencing this server need (API tokens, endpoint URLs). Injected into
                      the run pod as secretKeyRef envs — use instead of Env for anything
                      sensitive.
                    items:
                      description: |-
                        MCPServerSecretEnv names one environment variable sourced from a Secret
                        key that the run pod must expose so the MCP server can authenticate. Values
                        never appear in the CRD; the platform injects them as optional secretKeyRef
                        envs when a run references this server, and the agent bridges each value
                        into the server subprocess env at run start (secretEnv names pass the SDK
                        env filter automatically — no allowEnv pairing needed).
                      properties:
                        name:
                          description: name is the environment variable to set (e.g.
                            GRAFANA_SERVICE_ACCOUNT_TOKEN).
                          minLength: 1
                          type: string
                        optional:
                          description: |-
                            optional makes a missing Secret/key non-fatal for pod startup (the env
                            is simply absent). Defaults to true semantics at injection time; set
                            false to require the credential.
                          type: boolean
                        secretKey:
                          description: secretKey is the key within the Secret.
                          minLength: 1
                          type: string
                        secretName:
                          description: secretName is the Secret (in the run's namespace)
                            holding the value.
                          minLength: 1
                          type: string
                      required:
                      - name
                      - secretKey
                      - secretName
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  trustReadOnlyHint:
                    description: |-
                      TrustReadOnlyHint opts in to trusting this server's per-tool read-only
                      hints. When false (the default), the server's tools are treated as
                      mutating and are filtered out in read-only permission mode. Enable only
                      for servers you trust to label their tools honestly.
                    type: boolean
                  type:
                    description: |-
                      type is the transport. Only "stdio" is supported today; the enum grows
                      when a "remote" (HTTP/OAuth) transport is added.
                    enum:
                    - stdio
                    type: string
                required:
                - command
                type: object
              version:
                type: string
            required:
            - mcpServerConfig
            type: object
          status:
            description: MCPServerStatus defines the observed state of MCPServer.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
