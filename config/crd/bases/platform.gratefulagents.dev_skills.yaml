---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: skills.platform.gratefulagents.dev
spec:
  group: platform.gratefulagents.dev
  names:
    kind: Skill
    listKind: SkillList
    plural: skills
    singular: skill
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Skill is the Schema for reusable agent skills (inline or git-sourced
          SKILL.md instruction packages).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SkillSpec defines the desired state of Skill.
              A Skill is reusable prompt guidance ("how to do X well") that can be
              attached to AgentRuns through spec.skillRefs. Skills may require MCP
              servers, which are auto-attached alongside the skill.
            properties:
              description:
                description: |-
                  description is a short human-readable summary shown when browsing
                  skills. For git-sourced skills the resolved SKILL.md frontmatter
                  description is used when this is empty.
                maxLength: 1024
                type: string
              requires:
                description: SkillRequires declares resources a run needs for this
                  skill to be useful.
                properties:
                  mcpServers:
                    description: |-
                      mcpServers lists MCPServer resources (same namespace) this skill
                      teaches. Attaching the skill to a run auto-attaches these servers.
                    items:
                      description: NamedRef references another namespaced resource
                        by name.
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                type: object
              source:
                description: |-
                  SkillSource identifies where the skill's instructions come from.
                  Exactly one of inline or git must be set.
                properties:
                  git:
                    description: |-
                      SkillGitSource points at a git repository folder containing a SKILL.md file
                      in the Anthropic agent-skills format (YAML frontmatter with name and
                      description, body with the instructions). Public repositories only for now.
                    properties:
                      path:
                        description: |-
                          path is the folder within the repository that contains SKILL.md (repo
                          root if empty). The folder name must match the skill name from the
                          SKILL.md frontmatter.
                        type: string
                      ref:
                        description: ref is the branch, tag, or commit SHA to fetch
                          (default branch if empty).
                        type: string
                      url:
                        description: url is the repository URL (e.g. https://github.com/anthropics/skills).
                        minLength: 1
                        type: string
                    required:
                    - url
                    type: object
                  inline:
                    description: SkillInlineSource carries the skill instructions
                      directly in the spec.
                    properties:
                      instructions:
                        description: |-
                          instructions is the prompt guidance injected into the system prompt of
                          any run this skill is attached to. Keep it concise: it costs context on
                          every turn.
                        minLength: 1
                        type: string
                    required:
                    - instructions
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of inline or git must be set
                  rule: '(has(self.inline) ? 1 : 0) + (has(self.git) ? 1 : 0) == 1'
              version:
                type: string
            required:
            - source
            type: object
          status:
            description: SkillStatus defines the observed state of Skill.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastRefresh:
                description: |-
                  lastRefresh records the refresh annotation value that triggered the
                  last fetch (git-sourced skills re-fetch when the annotation changes).
                type: string
              observedGeneration:
                description: |-
                  observedGeneration is the spec generation the resolved content was
                  produced from.
                format: int64
                type: integer
              phase:
                type: string
              resolved:
                description: |-
                  SkillResolved is the materialized content of a skill after its source has
                  been fetched and validated (populated by the controller; for inline skills
                  it mirrors the spec).
                properties:
                  description:
                    type: string
                  instructions:
                    description: instructions is the full skill body injected into
                      runs.
                    type: string
                  name:
                    description: |-
                      name is the skill name from SKILL.md frontmatter (git) or the object
                      name (inline).
                    type: string
                  sha:
                    description: sha is the resolved commit SHA for git-sourced skills.
                    type: string
                  syncedAt:
                    format: date-time
                    type: string
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
