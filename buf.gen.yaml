# Generates the TypeScript RPC stubs consumed by the frontend workspace.
# Run via `make gen-rpc` (requires `pnpm install` in platform-app/ first so the
# protoc-gen-es plugin is available).
version: v2
plugins:
  - local: ./platform-app/frontend/node_modules/.bin/protoc-gen-es
    out: ./platform-app/frontend/src/rpc
    opt:
      - target=ts
inputs:
  - directory: rpc
